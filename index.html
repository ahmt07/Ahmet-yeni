<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berberim | Hızlı Randevu</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="flex flex-col items-center mb-8">
        <img src="logo.png" alt="Berber Logosu" class="w-24 h-24 mb-4 object-contain rounded-full border-2 border-yellow-500 p-1">
        <h1 class="text-2xl font-bold tracking-tight text-yellow-500 uppercase">Barber Studio</h1>
        <p class="text-gray-400 text-sm">Hızlı ve Otomatik Randevu Sistemi</p>
    </div>

    <div class="flex justify-center mb-6 space-x-2">
        <button onclick="showTab('randevu')" class="px-6 py-2 rounded-full glass-card hover:bg-yellow-500 hover:text-black transition">Randevu Al</button>
        <button onclick="showTab('sorgula')" class="px-6 py-2 rounded-full glass-card hover:bg-yellow-500 hover:text-black transition">Randevum Ne Zaman?</button>
        <button onclick="showTab('admin')" class="px-6 py-2 rounded-full glass-card opacity-50 text-xs">Admin</button>
    </div>

    <div id="randevu" class="tab-content active max-w-md mx-auto">
        <div class="glass-card p-6 rounded-2xl">
            <h2 class="text-xl mb-4 font-semibold">Yeni Randevu Oluştur</h2>
            <form id="appointmentForm" class="space-y-4">
                <input type="text" id="custName" placeholder="Adınız Soyadınız" required class="w-full p-3 rounded-lg bg-black border border-gray-700 outline-none focus:border-yellow-500">
                <input type="tel" id="custPhone" placeholder="Telefon Numaranız" required class="w-full p-3 rounded-lg bg-black border border-gray-700 outline-none focus:border-yellow-500">
                
                <select id="service" class="w-full p-3 rounded-lg bg-black border border-gray-700 outline-none">
                    <option value="Sac Kesimi">Saç Kesimi (30 dk)</option>
                    <option value="Sakal Tras">Sakal Tıraşı (20 dk)</option>
                    <option value="Komple Bakim">Komple Bakım (60 dk)</option>
                </select>

                <input type="datetime-local" id="appDate" required class="w-full p-3 rounded-lg bg-black border border-gray-700 outline-none">
                
                <button type="submit" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg hover:bg-yellow-400 transition">RANDEVUYU ONAYLA</button>
            </form>
        </div>
    </div>

    <div id="sorgula" class="tab-content max-w-md mx-auto">
        <div class="glass-card p-6 rounded-2xl">
            <h2 class="text-xl mb-4 font-semibold">Randevu Sorgula</h2>
            <div class="space-y-4">
                <input type="tel" id="searchPhone" placeholder="Telefon Numaranızı Girin" class="w-full p-3 rounded-lg bg-black border border-gray-700 outline-none">
                <button onclick="searchAppointment()" class="w-full border border-yellow-500 text-yellow-500 py-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">SORGULA</button>
                <div id="searchResult" class="mt-4 text-center p-3 rounded-lg bg-yellow-500/10 text-yellow-500 hidden border border-yellow-500/20"></div>
            </div>
        </div>
    </div>

    <div id="admin" class="tab-content max-w-4xl mx-auto">
        <div class="glass-card p-6 rounded-2xl overflow-x-auto">
            <h2 class="text-xl mb-4 font-semibold text-yellow-500">Admin Yönetim Paneli</h2>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="border-b border-gray-700">
                        <th class="py-2">Müşteri</th>
                        <th class="py-2">Hizmet</th>
                        <th class="py-2">Tarih</th>
                        <th class="py-2">İşlem</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // VERİ YÖNETİMİ (Localstorage kullanarak kalıcı hale getiriyoruz)
        let appointments = JSON.parse(localStorage.getItem('barber_apps')) || [];

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'admin') updateAdminTable();
        }

        // OTOMATİK ONAY VE KAYIT
        document.getElementById('appointmentForm').onsubmit = function(e) {
            e.preventDefault();
            
            const newApp = {
                id: Date.now(),
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                service: document.getElementById('service').value,
                date: document.getElementById('appDate').value,
                status: 'Otomatik Onaylandı'
            };

            // Çakışma Kontrolü (Aynı saatte randevu var mı?)
            const isConflict = appointments.some(app => app.date === newApp.date);
            
            if(isConflict) {
                alert("Maalesef bu saat dolu, lütfen başka bir zaman seçin.");
            } else {
                appointments.push(newApp);
                localStorage.setItem('barber_apps', JSON.stringify(appointments));
                alert("Randevunuz başarıyla oluşturuldu ve ONAYLANDI!");
                this.reset();
            }
        };

        // SORGULAMA FONKSİYONU
        function searchAppointment() {
            const phone = document.getElementById('searchPhone').value;
            const res = appointments.filter(app => app.phone === phone).pop();
            const resultDiv = document.getElementById('searchResult');
            
            if(res) {
                resultDiv.innerHTML = `Hoşgeldin ${res.name},<br><b>${res.service}</b> randevun: <br>📅 ${res.date.replace('T', ' ')}`;
                resultDiv.classList.remove('hidden');
            } else {
                resultDiv.innerText = "Kayıt bulunamadı.";
                resultDiv.classList.remove('hidden');
            }
        }

        // ADMIN TABLO GÜNCELLEME
        function updateAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = appointments.map(app => `
                <tr class="border-b border-gray-800">
                    <td class="py-3">${app.name}<br><span class="text-xs text-gray-500">${app.phone}</span></td>
                    <td>${app.service}</td>
                    <td>${app.date.replace('T', ' ')}</td>
                    <td><button onclick="deleteApp(${app.id})" class="text-red-500 text-xs">Sil</button></td>
                </tr>
            `).join('');
        }

        function deleteApp(id) {
            appointments = appointments.filter(a => a.id !== id);
            localStorage.setItem('barber_apps', JSON.stringify(appointments));
            updateAdminTable();
        }
    </script>
</body>
</html>
