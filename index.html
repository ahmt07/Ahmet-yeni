<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ahmet Tekeli Erkek Kuaförü | Randevu</title>
  <meta name="theme-color" content="#151515">
  <style>
    :root{
      --bg:#0f0f10;
      --card:#ffffff;
      --muted:#8a8a8a;
      --text:#101010;
      --dark:#1a1a1a;
      --line:#eaeaea;
      --gold:#b3872f;
      --danger:#d94141;
      --ok:#1f8f4f;
      --shadow: 0 16px 40px rgba(0,0,0,.18);
      --radius:14px;
      --safeTop: env(safe-area-inset-top);
      --safeBottom: env(safe-area-inset-bottom);
      font-synthesis-weight:none;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(179,135,47,.16), transparent 45%),
                  radial-gradient(900px 500px at 80% 10%, rgba(255,255,255,.08), transparent 40%),
                  linear-gradient(180deg, #0d0d0e, #101113);
      color:#fff;
      overflow:hidden;
    }
    .app{height:100%;display:flex;align-items:center;justify-content:center;padding:18px 12px}
    .phone{
      width:min(420px, 100%);
      height:min(860px, 100%);
      background:#0f0f10;
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      border:1px solid rgba(255,255,255,.08);
    }
    .topbar{
      height:64px;
      padding-top: calc(10px + var(--safeTop));
      padding-left:14px;
      padding-right:14px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      background: linear-gradient(180deg, #171717, #141414);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .topbar .left, .topbar .right{display:flex;align-items:center;gap:10px;min-width:56px}
    .topbar .title{flex:1;text-align:center;font-weight:800;letter-spacing:.8px;opacity:.95}
    .iconbtn{
      width:38px;height:38px;border-radius:12px;
      display:grid;place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      cursor:pointer;user-select:none;
    }
    .iconbtn:active{transform:scale(.98)}
    .iconbtn svg{width:20px;height:20px;fill:#fff;opacity:.92}
    .content{
      height: calc(100% - 64px);
      overflow:auto;
      background: #f7f7f7;
      color: var(--text);
      padding-bottom: calc(16px + var(--safeBottom));
    }

    /* ✅ Ana ekran: iPhone’da iç içe girmesin */
    .home-hero{
      min-height: 420px;
      position:relative;
      background:
        linear-gradient(0deg, rgba(0,0,0,.55), rgba(0,0,0,.15)),
        radial-gradient(1200px 700px at 40% 0%, rgba(255,255,255,.10), transparent 55%),
        linear-gradient(120deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        linear-gradient(180deg, #2b2b2b, #151515);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      color:#fff;
      overflow:hidden;
      padding: 22px 16px 16px;
    }
    .home-hero::before{
      content:"";position:absolute; inset:-40px;
      background:
        radial-gradient(closest-side at 70% 30%, rgba(255,255,255,.10), transparent 70%),
        radial-gradient(closest-side at 25% 25%, rgba(255,255,255,.08), transparent 70%);
      filter: blur(1px);
      opacity:.9;
    }
    .brand{position:relative;text-align:center;padding:0 18px}
    .logo-badge{
      width: 210px;height: 118px;border: 4px solid rgba(255,255,255,.85);
      border-radius: 999px;margin:0 auto 14px;
      display:flex;align-items:center;justify-content:center;
      background: rgba(0,0,0,.10);backdrop-filter: blur(2px);
    }
    .brand h1{margin:0;font-size:30px;letter-spacing:3px;font-weight:900;text-transform:uppercase}
    .brand .sub{margin-top:6px;font-size:14px;opacity:.86}
    .logo-svg{width:160px;height:70px;opacity:.95}

    .home-menu{
      position:static;
      width:100%;
      background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.62));
      padding: 14px 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
    }

    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px}
    .grid .item{display:flex;flex-direction:column;align-items:center;gap:8px;color:#fff;text-decoration:none;cursor:pointer;user-select:none}
    .grid .item .gicon{
      width:52px;height:52px;border-radius:16px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.06);
      box-shadow: 0 10px 18px rgba(0,0,0,.16);
    }
    .grid .item .gicon svg{width:26px;height:26px;fill:#fff;opacity:.92}
    .grid .item .label{font-size:11px;letter-spacing:.6px;opacity:.95;text-transform:uppercase}

    .list{background:#fff}
    .row{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;border-bottom:1px solid #ededed;gap:12px;
    }
    .row .name{font-weight:800;color:var(--gold)}
    .row .price{font-weight:800;color:#9a9a9a;min-width:64px;text-align:right}
    .row .meta{font-size:12px;color:#9c9c9c;margin-top:4px;font-weight:700}

    .srow{
      display:flex;align-items:flex-start;justify-content:space-between;
      padding:14px 16px;border-bottom:1px solid #ededed;gap:12px;
      cursor:pointer;user-select:none;background:#fff;
    }
    .sleft{display:flex;gap:12px;align-items:flex-start}
    .radio{
      width:22px;height:22px;border-radius:999px;border:2px solid #c9b08a;
      display:grid;place-items:center;margin-top:2px;flex:0 0 auto;
    }
    .radio .dot{width:12px;height:12px;border-radius:999px;background:var(--gold);display:none}
    .srow.selected .radio{border-color:var(--gold)}
    .srow.selected .radio .dot{display:block}
    .srow .stitle{font-weight:900;color:#2b2b2b}
    .srow .sdur{font-size:12px;color:#9a9a9a;font-weight:800;margin-top:4px}
    .srow .sprice{font-weight:900;color:#7f7f7f;min-width:64px;text-align:right}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:14px 16px;border-radius:14px;border:1px solid transparent;
      font-weight:900;letter-spacing:.6px;cursor:pointer;user-select:none;
    }
    .btn:active{transform:scale(.99)}
    .btn.primary{background:var(--gold);color:#fff;box-shadow:0 10px 24px rgba(179,135,47,.25)}
    .btn.ghost{background:#fff;border-color:#e6e6e6;color:#2b2b2b}
    .btn.danger{background:#fff;border-color:#f0c7c7;color:var(--danger);font-weight:900}
    .btn.ok{background:#fff;border-color:#cfe9d8;color:var(--ok);font-weight:900}
    .btn.full{width:100%}
    .btn.sm{padding:10px 12px;border-radius:12px;font-weight:900;letter-spacing:.2px}

    .section{padding:14px 16px;background:#fff;border-bottom:1px solid #eee}
    .pad{padding:14px 16px}
    .hint{font-size:12px;color:#8c8c8c;font-weight:800;margin-top:6px}
    .rowTitle{
      padding:14px 16px 10px;background:#fff;border-bottom:1px solid #eee;
      font-weight:900;letter-spacing:.6px;text-transform:uppercase;
    }
    .hr{height:10px;background:#f1f1f1}

    .dateStrip{background:#fff;padding:14px 14px 6px;border-bottom:1px solid #eee}
    .hTitle{font-weight:900;letter-spacing:.6px;margin-bottom:10px;text-transform:uppercase}
    .dates{display:flex;gap:10px;overflow:auto;padding-bottom:8px}
    .dateCard{
      width:66px;flex:0 0 auto;border-radius:12px;border:1px solid #ececec;background:#fff;
      padding:10px;text-align:center;cursor:pointer;user-select:none;
    }
    .dateCard .d1{font-weight:900;font-size:12px;color:#8c8c8c}
    .dateCard .d2{font-weight:900;font-size:18px;color:#2b2b2b;margin-top:4px}
    .dateCard .d3{font-weight:800;font-size:12px;color:#a0a0a0;margin-top:4px}
    .dateCard.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.10)}
    .dateCard.active .d1,.dateCard.active .d3{color:rgba(179,135,47,.95)}
    .dateCard.active .d2{color:var(--gold)}

    .staffWrap{padding:14px 14px 2px;background:#fff;border-bottom:1px solid #eee}
    .staffs{display:flex;gap:12px;overflow:auto;padding-bottom:10px}
    .staffCard{
      width:120px;flex:0 0 auto;border-radius:14px;border:1px solid #ececec;background:#fff;
      padding:12px 10px;text-align:center;cursor:pointer;user-select:none;
    }
    .avatar{
      width:60px;height:60px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #fff, #e9e9e9);
      border: 1px solid #e6e6e6;
      display:grid;place-items:center;margin:0 auto 8px;overflow:hidden;
    }
    .avatar span{font-weight:900;color:#6c6c6c;font-size:18px}
    .staffCard .sname{font-weight:900;color:#2b2b2b}
    .staffCard.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.12)}

    .timeWrap{padding:14px;background:#fff;border-bottom:1px solid #eee}
    .times{display:flex;gap:10px;overflow:auto;padding-bottom:4px}
    .tchip{
      min-width:76px;padding:12px;border-radius:12px;
      background:#dcdcdc;color:#fff;font-weight:900;text-align:center;
      cursor:pointer;user-select:none;flex:0 0 auto;
    }
    .tchip.available{background:#a9a9a9}
    .tchip.active{background:var(--gold)}
    .tchip.disabled{background:#ececec;color:#bdbdbd;cursor:not-allowed}

    .summary{padding:14px 16px;background:#fff;border-bottom:1px solid #eee}
    .summary .line{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 0;border-bottom:1px dashed #eee;gap:12px;
    }
    .summary .line:last-child{border-bottom:none}
    .summary .k{font-weight:900;color:#8c8c8c}
    .summary .v{font-weight:900;color:#2b2b2b}
    .summary .sv{font-weight:900;color:var(--gold)}

    .tabs{display:flex;background:#262626;color:#fff}
    .tab{
      flex:1;text-align:center;padding:12px 10px;font-weight:900;cursor:pointer;
      user-select:none;opacity:.9;border-bottom:3px solid transparent;
    }
    .tab.active{background:#2f2f2f;border-bottom-color:var(--gold);opacity:1}

    /* Admin alt sekmeler */
    .subtabs{display:flex;gap:10px;overflow:auto;background:#fff;border-bottom:1px solid #eee;padding:10px 12px}
    .chip{
      flex:0 0 auto;
      padding:10px 12px;border-radius:999px;
      border:1px solid #e6e6e6;background:#fff;
      font-weight:900;color:#2b2b2b;
      cursor:pointer;user-select:none;
      white-space:nowrap;
    }
    .chip.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.10);color:var(--gold)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}
    .toolbar input{
      flex:1; min-width: 160px;
      padding:12px;border-radius:12px;border:1px solid #e6e6e6;outline:none;
      font-weight:800;font-size:14px;
    }

    .bcard{background:#fff;padding:16px;border-bottom:1px solid #eee}
    .bhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .bday{font-weight:900;font-size:26px;color:#2b2b2b}
    .bmeta{font-weight:800;color:#7f7f7f;margin-top:6px}
    .bprice{font-weight:900;font-size:28px;color:#2b2b2b;white-space:nowrap}
    .center{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 0 8px}
    .bigAvatar{
      width:90px;height:90px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #fff, #e9e9e9);
      border: 1px solid #e6e6e6;
      display:grid;place-items:center;overflow:hidden;
    }
    .bigAvatar span{font-weight:900;color:#6c6c6c;font-size:26px}
    .bname{font-weight:900;font-size:20px;color:#2b2b2b}
    .bline{width:100%;display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-weight:900;gap:12px}
    .muted{color:#8c8c8c;font-weight:900}
    .spacer{height:10px}

    .form{padding:14px 16px;background:#fff;border-bottom:1px solid #eee}
    .field{margin-bottom:10px}
    label{display:block;font-size:12px;font-weight:900;color:#7e7e7e;margin-bottom:6px}
    input, select{
      width:100%;padding:12px;border-radius:12px;border:1px solid #e6e6e6;outline:none;
      font-weight:800;font-size:15px;background:#fff;
    }
    input:focus, select:focus{border-color:rgba(179,135,47,.55)}

    .toast{
      position:absolute;left:14px;right:14px;bottom: calc(16px + var(--safeBottom));
      background: rgba(20,20,20,.92);color:#fff;padding:12px 14px;border-radius:14px;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
      display:none;z-index:50;border:1px solid rgba(255,255,255,.08);
      font-weight:900;
    }
    .toast.show{display:block}
    .toast small{opacity:.8;font-weight:800}

    @media (max-height: 740px){
      .brand h1{font-size:26px}
      .home-hero{min-height: 400px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="phone" id="phone">
    <div class="topbar">
      <div class="left">
        <div class="iconbtn" id="backBtn" title="Geri">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 1 0 1.4L10.41 12l4.29 4.3a1 1 0 1 1-1.4 1.4l-5-5a1 1 0 0 1 0-1.4l5-5a1 1 0 0 1 1.4 0z"/></svg>
        </div>
      </div>
      <div class="title" id="topTitle">AHMET TEKELİ</div>
      <div class="right">
        <div class="iconbtn" id="homeBtn" title="Ana Sayfa">
          <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/></svg>
        </div>
      </div>
    </div>

    <div class="content" id="content"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
/** =========================
 *  0) AYARLAR
 *  ========================= */
const CONFIG = {
  brandName: "Ahmet Tekeli Erkek Kuaförü",
  brandShort: "AHMET TEKELİ",
  slogan: "Erkeğin makyajı saçı sakalıdır",
  gold: "#b3872f",
  phone: "+90 5XX XXX XX XX",
  whatsapp: "+90 5XX XXX XX XX",
  instagram: "@esnafmuhabbeti",
  address: "Antalya / Muratpaşa (Adresini buraya yaz)",
  mapUrl: "https://maps.google.com/?q=Antalya",
  adminPin: "1234"
};

/** =========================
 *  1) DEMO VERİLER
 *  ========================= */
const SEED = {
  services: [
    { id:"svc_hair", name:"Saç Kesimi", price: 350, duration:45 },
    { id:"svc_beard", name:"Sakal Tıraşı", price: 200, duration:15 },
    { id:"svc_kid", name:"Çocuk Tıraşı", price: 300, duration:30 },
    { id:"svc_combo", name:"Saç + Sakal + Yıkama + Fön", price: 550, duration:60 },
    { id:"svc_wash", name:"Saç Yıkama ve Fön", price: 250, duration:15 },
    { id:"svc_tonic", name:"Saç Bakımı (Tonik ile)", price: 250, duration:30 },
    { id:"svc_neck", name:"Ense ve Favori Düzeltme", price: 150, duration:15 },
    { id:"svc_wax", name:"Ağda (Yanak - Kulak)", price: 150, duration:15 },
    { id:"svc_clay", name:"Cilt Bakımı (Kil maske)", price: 300, duration:15 },
    { id:"svc_mineral", name:"Maden Suyu Cilt Bakımı", price: 300, duration:15 },
    { id:"svc_brow", name:"Anatomik Kaş Çizimi", price: 300, duration:15 },
    { id:"svc_black", name:"Black Mask", price: 300, duration:15 },
    { id:"svc_goldmask", name:"Peel Off Gold Mask", price: 350, duration:15 }
  ],
  staff: [
    { id:"st_ahmet", name:"Ahmet Tekeli", role:"Usta", specialties:["Saç","Sakal","VIP"] },
    { id:"st_usta2", name:"Usta 2", role:"Berber", specialties:["Saç","Fön"] },
    { id:"st_usta3", name:"Usta 3", role:"Berber", specialties:["Sakal","Bakım"] }
  ],
  workingHours: {
    0: null, // Pazar kapalı
    1: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    2: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    3: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    4: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    5: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    6: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] }
  }
};

/** =========================
 *  2) Helpers
 *  ========================= */
const $ = (sel, root=document) => root.querySelector(sel);
const DAYS_TR = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const DAYS_SHORT = ["PAZ","PTS","SAL","ÇAR","PER","CUM","CTS"];
const MONTHS_TR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
function pad2(n){return String(n).padStart(2,"0");}
function toMin(hhmm){ const [h,m]=hhmm.split(":").map(Number); return h*60+m; }
function fromMin(min){ const h=Math.floor(min/60), m=min%60; return `${pad2(h)}:${pad2(m)}`; }
function ymd(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function sum(arr){ return arr.reduce((a,b)=>a+b,0); }
function currencyTry(n){ return `${Number(n||0).toLocaleString("tr-TR")} ₺`; }
function initials(name){
  const parts=(name||"").trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return "•";
  const a=parts[0][0]||"";
  const b=parts.length>1 ? parts[parts.length-1][0] : (parts[0][1]||"");
  return (a+b).toUpperCase();
}
function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
function escapeAttr(s){ return escapeHtml(s).replaceAll("\n"," "); }
function nowKey(){
  const d=new Date();
  return ymd(d)+" "+fromMin(d.getHours()*60+d.getMinutes());
}
function toast(msg, sub=""){
  const t=$("#toast");
  t.innerHTML = sub ? `${msg}<br><small>${sub}</small>` : msg;
  t.classList.add("show");
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>t.classList.remove("show"), 2400);
}
function confirmSafe(msg){ try{ return confirm(msg); } catch(e){ return true; } }
function normPhone(p){ return String(p||"").replace(/\D/g,""); }
function safeStr(x){ return (x==null? "" : String(x)); }

/** =========================
 *  3) Storage (Local)
 *  ========================= */
const LS_KEYS = {
  init: "atkuafor_init_v3",
  me: "atkuafor_me_v3",
  services: "atkuafor_services_v3",
  staff: "atkuafor_staff_v3",
  bookings: "atkuafor_bookings_v3",
  hours: "atkuafor_hours_v3",
  customers: "atkuafor_customers_v3"
};

const Store = {
  init(){
    if(localStorage.getItem(LS_KEYS.init)) return;
    localStorage.setItem(LS_KEYS.services, JSON.stringify(SEED.services));
    localStorage.setItem(LS_KEYS.staff, JSON.stringify(SEED.staff));
    localStorage.setItem(LS_KEYS.bookings, JSON.stringify([]));
    localStorage.setItem(LS_KEYS.hours, JSON.stringify(SEED.workingHours));
    localStorage.setItem(LS_KEYS.customers, JSON.stringify([]));
    localStorage.setItem(LS_KEYS.init, "1");
  },
  resetAll(){
    localStorage.removeItem(LS_KEYS.init);
    localStorage.removeItem(LS_KEYS.me);
    localStorage.removeItem(LS_KEYS.services);
    localStorage.removeItem(LS_KEYS.staff);
    localStorage.removeItem(LS_KEYS.bookings);
    localStorage.removeItem(LS_KEYS.hours);
    localStorage.removeItem(LS_KEYS.customers);
    Store.init();
  },

  getMe(){ return JSON.parse(localStorage.getItem(LS_KEYS.me) || "null"); },
  setMe(me){ localStorage.setItem(LS_KEYS.me, JSON.stringify(me)); },
  clearMe(){ localStorage.removeItem(LS_KEYS.me); },

  getServices(){ return JSON.parse(localStorage.getItem(LS_KEYS.services) || "[]"); },
  setServices(arr){ localStorage.setItem(LS_KEYS.services, JSON.stringify(arr)); },

  getStaff(){ return JSON.parse(localStorage.getItem(LS_KEYS.staff) || "[]"); },
  setStaff(arr){ localStorage.setItem(LS_KEYS.staff, JSON.stringify(arr)); },

  getHours(){ return JSON.parse(localStorage.getItem(LS_KEYS.hours) || "null"); },
  setHours(obj){ localStorage.setItem(LS_KEYS.hours, JSON.stringify(obj)); },

  getBookings(){ return JSON.parse(localStorage.getItem(LS_KEYS.bookings) || "[]"); },
  setBookings(arr){ localStorage.setItem(LS_KEYS.bookings, JSON.stringify(arr)); },

  getCustomers(){ return JSON.parse(localStorage.getItem(LS_KEYS.customers) || "[]"); },
  setCustomers(arr){ localStorage.setItem(LS_KEYS.customers, JSON.stringify(arr)); },

  upsertCustomer({name, phone}){
    const phoneN = normPhone(phone);
    const list = Store.getCustomers();
    let c = list.find(x => x.phoneN === phoneN);
    if(!c){
      c = { id:"cu_"+Math.random().toString(16).slice(2,10), name, phone, phoneN, createdAt:new Date().toISOString() };
      list.push(c);
    }else{
      c.name = name || c.name;
      c.phone = phone || c.phone;
    }
    Store.setCustomers(list);
    return c;
  },

  addBooking(b){ const all=Store.getBookings(); all.push(b); Store.setBookings(all); },
  updateBooking(id, patch){
    const all=Store.getBookings();
    const i=all.findIndex(x=>x.id===id);
    if(i>=0){ all[i]={...all[i], ...patch}; Store.setBookings(all); }
  },
  deleteBooking(id){
    Store.setBookings(Store.getBookings().filter(b=>b.id!==id));
  }
};

/** =========================
 *  4) Slot hesaplama (15dk)
 *  ========================= */
function subtractIntervals(baseIntervals, cutIntervals){
  let result = baseIntervals.slice();
  for(const cut of cutIntervals){
    const next=[];
    for(const b of result){
      if(cut.e <= b.s || cut.s >= b.e){ next.push(b); }
      else{
        if(cut.s > b.s) next.push({s:b.s, e:cut.s});
        if(cut.e < b.e) next.push({s:cut.e, e:b.e});
      }
    }
    result = next;
  }
  return result.filter(x=>x.e-x.s>0).sort((a,b)=>a.s-b.s);
}
function getFreeIntervals(dateStr, staffId){
  const d = new Date(dateStr+"T00:00:00");
  const dow = d.getDay();
  const hours = Store.getHours() || SEED.workingHours;
  const wh = hours[dow];
  if(!wh) return [];
  const base=[{s:toMin(wh.start), e:toMin(wh.end)}];
  const breaks=(wh.breaks||[]).map(x=>({s:toMin(x.start), e:toMin(x.end)}));
  const busy=Store.getBookings()
    .filter(b=>b.staffId===staffId && b.date===dateStr && b.status==="active")
    .map(b=>({s:toMin(b.time), e:toMin(b.endTime)}));
  let free=subtractIntervals(base, breaks);
  free=subtractIntervals(free, busy);
  return free;
}
function generateSlots(dateStr, staffId, durationMin, step=15){
  if(!dateStr || !staffId || !durationMin) return [];
  const free=getFreeIntervals(dateStr, staffId);
  const slots=[];
  for(const intv of free){
    let t=intv.s;
    if(t % step !== 0) t += (step - (t % step));
    while(t + durationMin <= intv.e){
      slots.push(fromMin(t));
      t += step;
    }
  }
  return slots;
}

function nextDays(n){
  const arr=[]; const d=new Date();
  for(let i=0;i<n;i++){ const x=new Date(d); x.setDate(d.getDate()+i); arr.push(x); }
  return arr;
}

function renderTimeslots(slots){
  const t = State.bookingDraft.time;
  if(!slots.length) return `<div class="tchip disabled">—</div>`;
  return slots.map(x=>{
    const active = x===t;
    return `<div class="tchip ${active?"active":"available"}" onclick="App.setTime('${x}')">${x}</div>`;
  }).join("");
}

function buildCustomerStats(){
  const customers = Store.getCustomers();
  const bookings = Store.getBookings();
  const map = new Map();

  for(const c of customers){
    map.set(c.id, { ...c, total:0, active:0, last:null, lastDate:null, revenue:0 });
  }
  for(const b of bookings){
    const entry = map.get(b.customerId);
    if(!entry) continue;
    entry.total += 1;
    if(b.status==="active") entry.active += 1;
    entry.revenue += (b.totalPrice||0);
    const key = b.date+" "+b.time;
    if(!entry.lastDate || key > entry.lastDate){
      entry.lastDate = key;
      entry.last = b;
    }
  }
  return Array.from(map.values()).sort((a,b)=>{
    const ak=a.lastDate||"", bk=b.lastDate||"";
    return bk.localeCompare(ak);
  });
}

const App = {
  nav(route){
    if(route==="logout"){ App.logout(); return; }
    push(route);
  },
  startBooking(){
    State.bookingDraft.time=null;
    push("book_services");
  },
  resetBooking(){
    State.bookingDraft={ serviceIds:[], date:null, staffId:null, time:null };
    toast("Sıfırlandı", "Yeni seçim yapabilirsin.");
    render();
  },
  toggleService(id){
    const s=new Set(State.bookingDraft.serviceIds);
    if(s.has(id)) s.delete(id); else s.add(id);
    State.bookingDraft.serviceIds=[...s];
    render();
  },
  nextBooking(){ push("book_pick"); },
  setDate(ds){ State.bookingDraft.date=ds; State.bookingDraft.time=null; render(); },
  setStaff(id){ State.bookingDraft.staffId=id; State.bookingDraft.time=null; render(); },
  setTime(t){ State.bookingDraft.time=t; render(); },

  login(){
    const name=($("#inName")?.value||"").trim();
    const phone=($("#inPhone")?.value||"").trim();
    if(!name || !phone){ toast("Eksik bilgi","Ad soyad ve telefon gir."); return; }

    // ✅ Aynı telefonla tekrar girişte aynı müşteri ID
    const c = Store.upsertCustomer({name, phone});
    Store.setMe({ id:c.id, name:c.name, phone:c.phone });

    toast("Giriş yapıldı", c.name);
    render();
  },
  logout(){
    Store.clearMe();
    toast("Çıkış yapıldı");
    goHome();
  },

  finishBooking(){
    const me=Store.getMe();
    if(!me){ toast("Giriş gerekli","Hesabım’dan giriş yap."); push("account"); return; }

    const staff=Store.getStaff();
    if(!State.bookingDraft.staffId || !State.bookingDraft.date || !State.bookingDraft.time){
      toast("Seçimler eksik","Tarih/Personel/Saat seç.");
      return;
    }

    const services=Store.getServices();
    const selectedServices=State.bookingDraft.serviceIds.map(id=>services.find(x=>x.id===id)).filter(Boolean);
    const duration = sum(selectedServices.map(x=>x.duration)) || 30;
    const total = sum(selectedServices.map(x=>x.price)) || 0;

    const slotsNow=generateSlots(State.bookingDraft.date, State.bookingDraft.staffId, duration, 15);
    if(!slotsNow.includes(State.bookingDraft.time)){
      toast("Saat doldu","Başka saat seç.");
      State.bookingDraft.time = slotsNow[0] || null;
      render();
      return;
    }

    const endMin = toMin(State.bookingDraft.time) + duration;

    const booking = {
      id:"bk_"+Math.random().toString(16).slice(2,10),
      status:"active", // active | cancelled | completed
      createdAt:new Date().toISOString(),
      customerId: me.id,
      customerName: me.name,
      customerPhone: me.phone,
      staffId: State.bookingDraft.staffId,
      staffName: staff.find(x=>x.id===State.bookingDraft.staffId)?.name || "",
      date: State.bookingDraft.date,
      time: State.bookingDraft.time,
      endTime: fromMin(endMin),
      serviceIds: selectedServices.map(x=>x.id),
      serviceNames: selectedServices.map(x=>x.name),
      totalPrice: total,
      totalDuration: duration
    };

    Store.addBooking(booking);
    toast("Randevu oluşturuldu ✅", `${booking.date} ${booking.time} • ${booking.staffName}`);

    State.bookingDraft={ serviceIds:[], date:null, staffId:null, time:null };
    push("account");
  },

  setAcctTab(t){ State.acctTab=t; render(); },
  cancelBooking(id){
    Store.updateBooking(id, { status:"cancelled" });
    toast("Randevu iptal edildi");
    render();
  },

  openAdmin(){ push("admin"); },

    const pin = ($("#adminPin")?.value||"").trim();

    State.adminTab = "services";

    State.editStaffId = null;

    State.customerOpenId = null;
    toast("Admin kapandı");

    const price = Number(($("#as_price")?.value||"").trim());
    const dur = Number(($("#as_dur")?.value||"").trim());

    toast("Hizmet eklendi", name);

    render();
  },
  cancelServiceEdit(){
    State.editServiceId = null;
    toast("İptal edildi");
    render();
  },
  saveServiceEdit(){
    if(!State.isAdmin || !State.editServiceId){ toast("Yetki yok"); return; }
    const name = ($("#as_name")?.value||"").trim();
    const price = Number(($("#as_price")?.value||"").trim());
    const dur = Number(($("#as_dur")?.value||"").trim());
    if(!name || !price || !dur){ toast("Eksik bilgi","Ad/fiyat/süre gir."); return; }

    const arr=Store.getServices();
    const i=arr.findIndex(x=>x.id===State.editServiceId);
    if(i<0){ toast("Bulunamadı"); State.editServiceId=null; render(); return; }

    arr[i] = { ...arr[i], name, price, duration: dur };
    Store.setServices(arr);

    toast("Güncellendi ✅", name);
    State.editServiceId = null;
    render();
  },
  delService(id){
    if(!State.isAdmin){ toast("Yetki yok"); return; }
    const s = Store.getServices().find(x=>x.id===id);
    if(!confirmSafe(`"${s?.name||'Bu hizmet'}" silinsin mi?`)) return;

    Store.setServices(Store.getServices().filter(x=>x.id!==id));

    // Seçili draft'tan da çıkar
    State.bookingDraft.serviceIds = State.bookingDraft.serviceIds.filter(x=>x!==id);

    if(State.editServiceId===id) State.editServiceId=null;
    toast("Silindi");
    render();
  },

  /** ===== Personel CRUD ===== */
  addStaff(){
    if(!State.isAdmin){ toast("Yetki yok"); return; }
    const name = ($("#ap_name")?.value||"").trim();
    const role = ($("#ap_role")?.value||"").trim() || "Berber";
    if(!name){ toast("Eksik bilgi","Personel adı gir."); return; }

    const arr=Store.getStaff();
    arr.push({ id:"st_"+Math.random().toString(16).slice(2,8), name, role, specialties:[] });
    Store.setStaff(arr);

    toast("Personel eklendi", name);
    render();
  },
  editStaff(id){
    if(!State.isAdmin){ toast("Yetki yok"); return; }
    State.editStaffId = id;
    toast("Düzenleme modu", "Alanları değiştirip KAYDET'e bas.");
    render();
  },
  cancelStaffEdit(){
    State.editStaffId = null;
    toast("İptal edildi");
    render();
  },
  saveStaffEdit(){
    if(!State.isAdmin || !State.editStaffId){ toast("Yetki yok"); return; }
    const name = ($("#ap_name")?.value||"").trim();
    const role = ($("#ap_role")?.value||"").trim() || "Berber";
    if(!name){ toast("Eksik bilgi","Personel adı gir."); return; }

    const arr=Store.getStaff();
    const i=arr.findIndex(x=>x.id===State.editStaffId);
    if(i<0){ toast("Bulunamadı"); State.editStaffId=null; render(); return; }

    arr[i] = { ...arr[i], name, role };
    Store.setStaff(arr);

    toast("Güncellendi ✅", name);
    State.editStaffId = null;
    render();
  },
  delStaff(id){
    if(!State.isAdmin){ toast("Yetki yok"); return; }
    const p = Store.getStaff().find(x=>x.id===id);
    if(!confirmSafe(`"${p?.name||'Bu personel'}" silinsin mi?`)) return;

    Store.setStaff(Store.getStaff().filter(x=>x.id!==id));

    if(State.bookingDraft.staffId===id) State.bookingDraft.staffId = Store.getStaff()[0]?.id || null;
    if(State.editStaffId===id) State.editStaffId=null;

    toast("Silindi");
    render();
  },

  /** ===== Admin - Randevu işlemleri ===== */
  adminCancelBooking(id){
    if(!State.isAdmin) return;
    if(!confirmSafe("Bu randevu iptal edilsin mi?")) return;
    Store.updateBooking(id, { status:"cancelled" });
    toast("İptal edildi");
    render();
  },
  adminCompleteBooking(id){
    if(!State.isAdmin) return;
    Store.updateBooking(id, { status:"completed" });
    toast("Tamamlandı");
    render();
  },
  adminDeleteBooking(id){
    if(!State.isAdmin) return;
    if(!confirmSafe("Bu randevu tamamen silinsin mi?")) return;
    Store.deleteBooking(id);
    toast("Silindi");
    render();
  },

  /** ===== Admin - Müşteri işlemleri ===== */
  adminDeleteCustomer(cid){
    if(!State.isAdmin) return;
    if(!confirmSafe("Bu müşteri ve tüm randevuları silinsin mi?")) return;

    Store.setBookings(Store.getBookings().filter(b=>b.customerId!==cid));
    Store.setCustomers(Store.getCustomers().filter(c=>c.id!==cid));

    const me = Store.getMe();
    if(me?.id===cid) Store.clearMe();

    State.customerOpenId = null;
    toast("Müşteri silindi");
    render();
  },

  /** ===== Çalışma saatleri ===== */
  hoursOpenDay(dow){
    const hours = Store.getHours() || SEED.workingHours;
    hours[dow] = { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] };
    Store.setHours(hours);
    toast("Gün açıldı", DAYS_TR[dow]);
    render();
  },
  hoursCloseDay(dow){
    if(!confirmSafe(`${DAYS_TR[dow]} kapatılsın mı?`)) return;
    const hours = Store.getHours() || SEED.workingHours;
    hours[dow] = null;
    Store.setHours(hours);
    toast("Gün kapatıldı", DAYS_TR[dow]);
    render();
  },
  hoursEditDay(dow){
    const hours = Store.getHours() || SEED.workingHours;
    const wh = hours[dow] || { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] };
    const b0 = (wh.breaks||[])[0] || {start:"13:00", end:"13:30"};

    const start = prompt(`${DAYS_TR[dow]} başlangıç (HH:MM)`, wh.start) || wh.start;
    const end = prompt(`${DAYS_TR[dow]} bitiş (HH:MM)`, wh.end) || wh.end;
    const bs = prompt(`${DAYS_TR[dow]} mola başlangıç (HH:MM)`, b0.start) || b0.start;
    const be = prompt(`${DAYS_TR[dow]} mola bitiş (HH:MM)`, b0.end) || b0.end;

    hours[dow] = { start, end, breaks:[{start:bs, end:be}] };
    Store.setHours(hours);
    toast("Saatler güncellendi", DAYS_TR[dow]);
    render();
  },

  resetDemo(){
    if(!confirmSafe("Tüm veriler silinsin mi?")) return;
    Store.resetAll();
    State.isAdmin=false;
    State.route="home";
    State.stack=[];
    toast("Reset tamam", "Demo veriler yüklendi.");
    render();
  }
};

/** =========================
 *  9) Render
 *  ========================= */
function render(){
  $("#backBtn").onclick = back;
  $("#homeBtn").onclick = goHome;

  const c=$("#content");
  switch(State.route){
    case "home": c.innerHTML = Home(); break;
    case "services": c.innerHTML = Services(); break;
    case "staff": c.innerHTML = Staff(); break;
    case "contact": c.innerHTML = Contact(); break;
    case "where": c.innerHTML = Where(); break;
    case "gallery": c.innerHTML = Gallery(); break;
    case "account": c.innerHTML = Account(); break;
    case "book_services": c.innerHTML = BookServices(); break;
    case "book_pick": c.innerHTML = BookPick(); break;
    case "admin": c.innerHTML = Admin(); break;
    case "admin_panel": c.innerHTML = AdminPanel(); break;
    default: c.innerHTML = Home(); break;
  }
}

/** =========================
 *  10) Boot
 *  ========================= */
(function boot(){
  document.documentElement.style.setProperty("--gold", CONFIG.gold);
  Store.init();
  window.App = App;
  render();
})();
</script>
</body>
</html>
