<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli | Randevu Sistemi</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            color: #1e293b;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Arka plan karartma katmanı */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        /* Görseldeki Glassmorphism Efekti */
        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            color: #1e3a8a;
            font-size: 15px;
            margin-top: 6px;
        }
        .label-text {
            color: #1e3a8a;
            font-weight: 700;
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }
        /* Görseldeki Altın Sarısı Buton */
        .btn-randevu {
            background: linear-gradient(to bottom, #d4a373, #a67c52);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            margin-top: 25px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(166, 124, 82, 0.4);
        }
        .btn-randevu:active { transform: scale(0.98); }
        
        .slot-btn {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: #1e3a8a;
        }
        .slot-selected { background: #1e3a8a; color: white; }
        .slot-busy { opacity: 0.3; text-decoration: line-through; cursor: not-allowed; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <button onclick="toggleAdmin()" class="fixed top-6 right-6 bg-white px-4 py-2 rounded-xl font-bold text-sm text-slate-800 shadow-lg z-50">Admin Girişi</button>

    <div id="customerSection" class="glass-container text-center relative">
        <div class="absolute -top-16 left-1/2 -translate-x-1/2">
            <img src="logo.png" class="w-32 h-32 rounded-full border-4 border-white shadow-xl" onerror="this.src='https://via.placeholder.com/128?text=LOGO'">
        </div>

        <div class="mt-16">
            <h1 class="text-3xl font-bold text-[#1e3a8a] tracking-tight">AHMET TEKELİ</h1>
            <p class="text-[#1e3a8a] text-sm font-semibold tracking-widest">ERKEK KUAFÖRÜ</p>
            <div class="flex justify-center items-center mt-2 text-yellow-500 font-bold">
                ⭐ 4.8 <span class="text-[#1e3a8a]/60 text-xs ml-1 font-normal">(164)</span>
            </div>
        </div>

        <div class="text-left mt-6">
            <label class="label-text">Ad Soyad</label>
            <input type="text" id="cName" placeholder="Adınız ve Soyadınız" class="input-field">

            <label class="label-text">Telefon</label>
            <input type="tel" id="cPhone" placeholder="05XXXXXXXXX" class="input-field">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Berber Seçimi</label>
                    <select id="sBarber" onchange="updateSlots()" class="input-field appearance-none">
                        <option value="">Bir berber seçin</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">İşlem Seçimi</label>
                    <select id="sService" class="input-field appearance-none">
                        <option value="">Hizmet seçin</option>
                    </select>
                </div>
            </div>

            <label class="label-text">Tarih</label>
            <input type="date" id="sDate" onchange="updateSlots()" class="input-field">

            <label class="label-text">Saat Seçimi</label>
            <div id="slotGrid" class="grid grid-cols-4 gap-2 mt-2">
                <p class="col-span-4 text-xs text-[#1e3a8a]/60 italic">Lütfen bir berber ve tarih seçin.</p>
            </div>
        </div>

        <button onclick="bookApp()" class="btn-randevu">RANDEVU AL</button>
        
        <p onclick="showSearch()" class="text-[#1e3a8a] text-xs mt-4 underline cursor-pointer opacity-70">Randevularımı Görüntüle</p>
    </div>

    <div id="searchSection" class="glass-container hidden text-center">
        <h2 class="text-2xl font-bold text-[#1e3a8a] mb-6">Randevu Sorgula</h2>
        <input type="tel" id="searchPhone" placeholder="Telefon Numaranız" class="input-field text-center py-4">
        <button onclick="query()" class="btn-randevu mt-4">SORGULA</button>
        <div id="queryResult" class="mt-6 p-4 rounded-xl bg-white/40 text-sm font-bold text-[#1e3a8a]"></div>
        <button onclick="location.reload()" class="mt-4 text-xs text-[#1e3a8a] underline">Geri Dön</button>
    </div>

    <div id="adminSection" class="glass-container hidden max-h-[80vh] overflow-y-auto">
        <h2 class="text-2xl font-bold text-[#1e3a8a] mb-4">Yönetim Paneli</h2>
        <div class="space-y-4">
            <div class="bg-white/90 p-3 rounded-xl">
                <h3 class="text-xs font-bold mb-2">Berber Ekle</h3>
                <div class="flex gap-2">
                    <input type="text" id="newB" class="input-field !mt-0 !py-2 text-xs" placeholder="İsim">
                    <button onclick="addB()" class="bg-blue-900 text-white px-3 rounded-lg text-xs">Ekle</button>
                </div>
            </div>
            <div id="adminAppList" class="space-y-2">
                </div>
            <button onclick="location.reload()" class="w-full py-2 bg-red-800 text-white rounded-xl text-xs font-bold">Paneli Kapat</button>
        </div>
    </div>

    <script>
        // --- VERİ TABANI ---
        let db = JSON.parse(localStorage.getItem('at_barber_db')) || {
            barbers: ['Ahmet Tekeli', 'Mehmet Usta'],
            services: ['Saç Kesimi', 'Sakal Tıraşı', 'Cilt Bakımı', 'Saç & Sakal'],
            apps: [],
            hours: { start: "09:00", end: "20:00" }
        };

        let selectedTime = null;

        function save() { 
            localStorage.setItem('at_barber_db', JSON.stringify(db)); 
            renderUI(); 
        }

        // --- TAKVİM SİSTEMİ ---
        function updateSlots() {
            const grid = document.getElementById('slotGrid');
            const date = document.getElementById('sDate').value;
            const barber = document.getElementById('sBarber').value;
            grid.innerHTML = "";
            if(!date || !barber) return;

            let current = new Date(`${date}T${db.hours.start}`);
            let end = new Date(`${date}T${db.hours.end}`);

            while(current < end) {
                let time = current.toTimeString().substring(0,5);
                let busy = db.apps.some(a => a.date === date && a.time === time && a.barber === barber);
                
                let d = document.createElement('div');
                d.className = `slot-btn ${busy ? 'slot-busy' : ''}`;
                d.innerText = time;
                if(!busy) {
                    d.onclick = () => {
                        document.querySelectorAll('.slot-btn').forEach(x => x.classList.remove('slot-selected'));
                        d.classList.add('slot-selected');
                        selectedTime = time;
                    };
                }
                grid.appendChild(d);
                current.setMinutes(current.getMinutes() + 30);
            }
        }

        // --- RANDEVU AL ---
        function bookApp() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const date = document.getElementById('sDate').value;
            const service = document.getElementById('sService').value;
            const barber = document.getElementById('sBarber').value;

            if(!name || !phone || !selectedTime) return alert("Lütfen boş alan bırakmayın!");

            db.apps.push({ id: Date.now(), name, phone, date, time: selectedTime, service, barber });
            save();
            alert("Randevunuz başarıyla oluşturuldu!");
            location.reload();
        }

        // --- SORGULAMA ---
        function query() {
            const phone = document.getElementById('searchPhone').value;
            const found = db.apps.filter(a => a.phone === phone).pop();
            const res = document.getElementById('queryResult');
            if(found) {
                res.innerHTML = `Müşteri: ${found.name}<br>Tarih: ${found.date}<br>Saat: ${found.time}<br>Berber: ${found.barber}`;
            } else {
                res.innerHTML = "Aktif randevu bulunamadı.";
            }
        }

        // --- ADMIN ---
        function toggleAdmin() {
            const p = prompt("Şifre (1234):");
            if(p === "1234") {
                document.getElementById('customerSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
            }
        }

        function addB() {
            const n = document.getElementById('newB').value;
            if(n) { db.barbers.push(n); save(); document.getElementById('newB').value=""; }
        }

        function renderUI() {
            document.getElementById('sBarber').innerHTML = `<option value="">Bir berber seçin</option>` + db.barbers.map(b => `<option value="${b}">${b}</option>`).join('');
            document.getElementById('sService').innerHTML = `<option value="">Hizmet seçin</option>` + db.services.map(s => `<option value="${s}">${s}</option>`).join('');
            
            document.getElementById('adminAppList').innerHTML = db.apps.sort((a,b)=>a.date.localeCompare(b.date)).map(a => `
                <div class="bg-white/90 p-3 rounded-lg flex justify-between items-center text-[10px]">
                    <div><b>${a.name}</b><br>${a.date} | ${a.time} | ${a.barber}</div>
                    <button onclick="deleteA(${a.id})" class="text-red-600">Sil</button>
                </div>
            `).join('');
        }

        function deleteA(id) { db.apps = db.apps.filter(x=>x.id!==id); save(); }
        function showSearch() { 
            document.getElementById('customerSection').classList.add('hidden');
            document.getElementById('searchSection').classList.remove('hidden');
        }

        renderUI();
    </script>
</body>
</html>
