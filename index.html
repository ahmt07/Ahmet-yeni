<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli | Premium Barber</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Logo ve Başlık */
        .logo-box { width: 150px; height: 150px; margin: 20px auto; border: 3px solid var(--gold); border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(197,160,89,0.4); }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Kart Yapısı */
        .card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        .active { display: block; }

        /* Form Elemanları */
        .input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        
        /* Liste Öğeleri */
        .item { background: #252525; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--gold); }
        #toast { position: fixed; bottom: 20px; background: var(--gold); color: black; padding: 12px 25px; border-radius: 50px; display: none; z-index: 10000; font-weight: bold; }
        
        /* Admin Sidebar Benzeri */
        .admin-nav { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { flex: 1; padding: 10px; font-size: 11px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="logo.png" alt="Ahmet Tekeli">
    </div>

    <div id="view-login" class="card active">
        <h2 style="text-align:center; color:var(--gold);">Giriş Yap</h2>
        <input type="tel" id="lPhone" class="input" placeholder="Telefon (5xx...)" maxlength="10">
        <input type="password" id="lPass" class="input" placeholder="Şifre">
        <button class="btn btn-gold" onclick="doLogin()">Giriş Yap</button>
        <button class="btn btn-outline" onclick="showView('view-register')">Yeni Kayıt Ol</button>
    </div>

    <div id="view-register" class="card">
        <h2 style="text-align:center; color:var(--gold);">Müşteri Kaydı</h2>
        <input type="text" id="rName" class="input" placeholder="Ad Soyad">
        <input type="tel" id="rPhone" class="input" placeholder="Telefon" maxlength="10">
        <input type="password" id="rPass" class="input" placeholder="Şifre Belirle">
        <button class="btn btn-gold" onclick="doRegister()">Kayıt Ol</button>
        <button class="btn btn-outline" onclick="showView('view-login')">Geri Dön</button>
    </div>

    <div id="view-customer" class="card">
        <h3 id="custName">Hoş Geldin</h3>
        <button class="btn btn-gold" onclick="window.location.href='randevu-al.html'">➕ Yeni Randevu Al</button>
        <h4 style="margin-top:20px; color:var(--gold);">Randevularım</h4>
        <div id="cust-apps"></div>
        <button class="btn btn-outline" onclick="logout()" style="margin-top:20px;">Çıkış Yap</button>
    </div>

    <div id="view-admin" class="card" style="max-width: 600px;">
        <h2 style="color:var(--gold);">Admin Paneli</h2>
        <div class="admin-nav">
            <button class="nav-btn" onclick="loadAdminApps()">📅 Randevular</button>
            <button class="nav-btn" onclick="alert('Berber Yönetimi')">✂️ Berberler</button>
            <button class="nav-btn" onclick="alert('Stok Yönetimi')">📦 Stok</button>
            <button class="nav-btn" onclick="logout()">🚪 Çıkış</button>
        </div>
        <div id="admin-content">
            <h4>Bugünkü Randevular</h4>
            <div id="admin-apps-list"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- FIREBASE AYARLARI ---
        const firebaseConfig = {
            apiKey: "BURAYA_API_KEY_GELECEK",
            projectId: "ahmet-tekeli",
            appId: "BURAYA_APP_ID_GELECEK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FONKSİYONLARI ÇALIŞTIRMAK İÇİN WINDOW NESNESİNE BAĞLIYORUZ ---
        
        window.showView = (id) => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.doLogin = async () => {
            const p = document.getElementById("lPhone").value.trim();
            const pass = document.getElementById("lPass").value;

            // Admin Girişi (Numarayı kendinize göre değiştirin)
            if(p === "5350000000" && pass === "admin123") {
                showView('view-admin');
                loadAdminApps();
                return;
            }

            try {
                const snap = await getDoc(doc(db, "customers", p));
                if(snap.exists() && snap.data().pass === pass) {
                    localStorage.setItem("userPhone", p);
                    document.getElementById("custName").innerText = "Selam, " + snap.data().name;
                    showView('view-customer');
                    loadCustomerApps(p);
                } else {
                    showMsg("Hatalı bilgiler!");
                }
            } catch(e) { showMsg("Hata: Firebase bağlantısı yok!"); }
        };

        window.doRegister = async () => {
            const n = document.getElementById("rName").value;
            const p = document.getElementById("rPhone").value;
            const pass = document.getElementById("rPass").value;
            if(p.length < 10) return showMsg("Geçerli numara girin!");

            await setDoc(doc(db, "customers", p), { name: n, phone: p, pass: pass });
            showMsg("Kayıt başarılı!");
            window.doLogin();
        };

        window.loadCustomerApps = async (phone) => {
            const q = query(collection(db, "appointments"), where("customerPhone", "==", phone));
            const snap = await getDocs(q);
            let h = "";
            snap.forEach(d => {
                const a = d.data();
                h += `<div class="item"><b>${a.date} - ${a.time}</b><br><button onclick="deleteApp('${d.id}')" style="color:red; background:none; border:none; cursor:pointer;">İptal Et</button></div>`;
            });
            document.getElementById("cust-apps").innerHTML = h || "Randevunuz yok.";
        };

        window.loadAdminApps = async () => {
            const snap = await getDocs(collection(db, "appointments"));
            let h = "";
            snap.forEach(d => {
                const a = d.data();
                h += `<div class="item"><b>${a.customerName}</b><br>${a.date} | ${a.time}</div>`;
            });
            document.getElementById("admin-apps-list").innerHTML = h || "Randevu yok.";
        };

        window.deleteApp = async (id) => {
            if(confirm("Silinsin mi?")) {
                await deleteDoc(doc(db, "appointments", id));
                showMsg("Silindi.");
                loadCustomerApps(localStorage.getItem("userPhone"));
            }
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        function showMsg(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }
    </script>
</body>
</html>
