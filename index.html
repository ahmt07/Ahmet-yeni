<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli | Premium Barber Experience</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        :root {
            --gold: #c5a059;
            --gold-dark: #a68549;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-gray: #b5b5b5;
            --white: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* LOGO ALANI */
        .header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            margin: 0;
            color: var(--gold);
            text-transform: uppercase;
        }

        .sub-text {
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        /* KART TASARIMI */
        .container { width: 90%; max-width: 400px; margin-top: -20px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; }

        .input {
            width: 100%;
            background: #252525;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .input:focus { border-color: var(--gold); outline: none; }

        /* BUTONLAR */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            text-transform: uppercase;
        }

        .btn-gold { background: var(--gold); color: var(--dark); }
        .btn-gold:hover { background: var(--gold-dark); transform: translateY(-2px); }

        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 10px; }

        /* RANDEVU KARTLARI */
        .app-item {
            background: #252525;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--gold);
        }

        .app-info { font-size: 14px; margin-bottom: 10px; }
        .app-actions { display: flex; gap: 10px; }

        .btn-mini { padding: 8px; font-size: 12px; flex: 1; border-radius: 8px; border: none; cursor: pointer; color: white; }
        .bg-red { background: #c0392b; }
        .bg-blue { background: #2980b9; }

        #toast {
            position: fixed; bottom: 30px; background: var(--gold); color: black;
            padding: 12px 25px; border-radius: 50px; display: none; font-weight: bold;
            z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <span style="color:var(--gold); font-size:40px;">✂️</span>
        </div>
        <h1 class="logo-text">Ahmet Tekeli</h1>
        <div class="sub-text">Erkek Kuaförü</div>
    </div>

    <div class="container">
        <div id="view-auth" class="card">
            <div id="login-form">
                <div class="input-group">
                    <label>Telefon</label>
                    <input type="tel" id="loginPhone" class="input" placeholder="5xx xxx xxxx" maxlength="10">
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPass" class="input" placeholder="••••••">
                </div>
                <button class="btn btn-gold" onclick="handleLogin()">Giriş Yap</button>
                <div style="text-align:center; margin-top:15px;">
                    <a href="javascript:void(0)" onclick="forgotPass()" style="color:var(--text-gray); font-size:12px; text-decoration:none;">Şifremi Unuttum</a>
                </div>
                <button class="btn btn-outline" onclick="toggleAuth(true)">Kayıt Ol</button>
            </div>

            <div id="register-form" style="display:none;">
                <div class="input-group"><label>Ad Soyad</label><input type="text" id="regName" class="input"></div>
                <div class="input-group"><label>Telefon</label><input type="tel" id="regPhone" class="input" maxlength="10"></div>
                <div class="input-group"><label>Şifre</label><input type="password" id="regPass" class="input"></div>
                <button class="btn btn-gold" onclick="handleRegister()">Kayıt İşlemini Tamamla</button>
                <button class="btn btn-outline" onclick="toggleAuth(false)">Geri Dön</button>
            </div>
        </div>

        <div id="view-panel" style="display:none;">
            <div class="card">
                <h3 style="margin-top:0; color:var(--gold);">Hoş Geldin, <span id="userName">...</span></h3>
                <button class="btn btn-gold" onclick="goToBooking()">➕ Yeni Randevu Al</button>
            </div>

            <h4 style="text-transform:uppercase; letter-spacing:2px; font-size:12px; color:var(--gold);">Randevularım</h4>
            <div id="my-appointments">
                </div>

            <button class="btn btn-outline" onclick="logout()" style="border-color:#444; color:#888;">Güvenli Çıkış</button>
        </div>
    </div>

    <div id="toast"></div>



    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG BURAYA
        const firebaseConfig = { apiKey: "...", projectId: "ahmet-tekeli", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const COL = { cust: "customers", apps: "appointments" };

        // --- AUTH İŞLEMLERİ ---
        window.handleLogin = async () => {
            const p = document.getElementById("loginPhone").value.replace(/\D/g,"");
            const pass = document.getElementById("loginPass").value;
            
            const user = await getDoc(doc(db, COL.cust, p));
            if(user.exists() && user.data().pass === pass) {
                showPanel(user.data());
            } else {
                showMsg("Hatalı bilgiler!");
            }
        };

        // --- RANDEVU SİLME VE GÜNCELLEME ---
        window.cancelApp = async (id, dt, tm) => {
            if(confirm(`${dt} ${tm} randevunuzu iptal etmek istiyor musunuz?`)) {
                await deleteDoc(doc(db, COL.apps, id));
                showMsg("İptal edildi");
                loadUserApps(localStorage.getItem("activePhone"));
            }
        };

        window.editApp = (id, dt, tm) => {
            if(confirm("Tarihi değiştirmek için mevcut randevunuz silinecek ve takvime yönlendirileceksiniz?")) {
                deleteDoc(doc(db, COL.apps, id)).then(() => {
                    window.location.href = "randevu-al.html";
                });
            }
        };

        // --- UI YÖNETİMİ ---
        async function loadUserApps(phone) {
            const q = query(collection(db, COL.apps), where("customerPhone", "==", phone));
            const snap = await getDocs(q);
            let h = "";
            snap.forEach(d => {
                const a = d.data();
                h += `
                <div class="app-item">
                    <div class="app-info">
                        <b>📅 ${a.date}</b> <b style="color:var(--gold); margin-left:10px;">⏰ ${a.time}</b><br>
                        <small style="color:#888">${a.service || 'Hizmet Seçilmedi'}</small>
                    </div>
                    <div class="app-actions">
                        <button class="btn-mini bg-blue" onclick="editApp('${d.id}','${a.date}','${a.time}')">DEĞİŞTİR</button>
                        <button class="btn-mini bg-red" onclick="cancelApp('${d.id}','${a.date}','${a.time}')">İPTAL</button>
                    </div>
                </div>`;
            });
            document.getElementById("my-appointments").innerHTML = h || "<p style='color:#666'>Henüz randevunuz yok.</p>";
        }

        function showPanel(user) {
            localStorage.setItem("activePhone", user.phone);
            document.getElementById("userName").innerText = user.name;
            document.getElementById("view-auth").style.display = "none";
            document.getElementById("view-panel").style.display = "block";
            loadUserApps(user.phone);
        }

        window.showMsg = (m) => {
            const t = document.getElementById("toast");
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display="none", 3000);
        };

        window.toggleAuth = (reg) => {
            document.getElementById("login-form").style.display = reg ? "none" : "block";
            document.getElementById("register-form").style.display = reg ? "block" : "none";
        };

        window.logout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
