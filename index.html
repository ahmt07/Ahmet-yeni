<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli | Pro Enterprise v11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --gold: #d4a373; --gold-dark: #a67c52; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8fafc; }
        
        /* Müşteri Ekranı Cam Efekti */
        .client-bg {
            background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .client-bg::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px; padding: 40px; width: 92%; max-width: 480px; z-index: 10;
        }

        .input-box { background: white; border-radius: 14px; padding: 12px 16px; width: 100%; height: 50px; border: 1px solid #e2e8f0; font-size: 14px; }

        /* Admin Paneli Simetrik Navigasyon */
        .admin-nav-btn {
            background: white; border: 1px solid #e2e8f0; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1/1; gap: 6px; font-weight: 700; font-size: 10px; color: #64748b; transition: 0.3s;
        }
        .admin-nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-3px); }

        .slot { background: white; border-radius: 12px; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: var(--primary); cursor: pointer; transition: 0.2s; }
        .slot-selected { background: var(--primary) !important; color: white !important; }
        .slot-busy { opacity: 0.2; text-decoration: line-through; pointer-events: none; }
        
        .admin-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #e2e8f0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="clientUI" class="client-bg">
        <button onclick="openM('authM')" class="fixed top-6 right-6 bg-white/90 px-4 py-2 rounded-xl text-[10px] font-black text-blue-900 z-50">ADMİN GİRİŞİ</button>
        <div class="glass-card text-center">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase mb-2">AHMET TEKELİ</h1>
            <p class="text-white/60 text-[9px] tracking-[6px] uppercase font-light mb-8">Premium Barber Experience</p>
            
            <div class="space-y-4 text-left">
                <input type="text" id="cName" placeholder="Adınız Soyadınız" class="input-box">
                <input type="tel" id="cPhone" placeholder="05XX XXX XX XX" class="input-box">
                <div class="grid grid-cols-2 gap-3">
                    <select id="sBarber" onchange="loadSlots()" class="input-box"></select>
                    <select id="sService" class="input-box"></select>
                </div>
                <input type="date" id="sDate" onchange="loadSlots()" class="input-box">
                <div id="slotGrid" class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto"></div>
            </div>
            <button onclick="book()" class="w-full bg-gradient-to-r from-[#d4a373] to-[#a67c52] text-white font-bold py-4 rounded-2xl mt-8 shadow-xl">RANDEVU OLUŞTUR</button>
        </div>
    </div>

    <div id="adminUI" class="fixed inset-0 bg-[#f1f5f9] hidden z-[100] overflow-y-auto">
        <div class="bg-white border-b h-20 flex items-center px-8 justify-between sticky top-0 z-50">
            <h2 class="font-black text-blue-900 tracking-tight">AHMET TEKELİ <span class="font-normal text-slate-400">| Panel</span></h2>
            <button onclick="location.reload()" class="text-red-500 font-bold text-xs uppercase">Paneli Kapat</button>
        </div>

        <div class="max-w-6xl mx-auto p-6">
            <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mb-8">
                <button onclick="tab('t-apps')" class="admin-nav-btn active" id="btn-t-apps"><span>📅</span><span>Randevu</span></button>
                <button onclick="tab('t-users')" class="admin-nav-btn" id="btn-t-users"><span>👥</span><span>Müşteri</span></button>
                <button onclick="tab('t-barbers')" class="admin-nav-btn" id="btn-t-barbers"><span>✂️</span><span>Berberler</span></button>
                <button onclick="tab('t-services')" class="admin-nav-btn" id="btn-t-services"><span>💰</span><span>Hizmetler</span></button>
                <button onclick="tab('t-hours')" class="admin-nav-btn" id="btn-t-hours"><span>⏰</span><span>Mesai</span></button>
                <button onclick="tab('t-gallery')" class="admin-nav-btn" id="btn-t-gallery"><span>🖼️</span><span>Galeri</span></button>
            </div>

            <div id="t-apps" class="t-content block">
                <div id="list-apps" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="t-barbers" class="t-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="admin-card">
                        <h4 class="font-bold mb-4">Yeni Berber & Mesai Ayarı</h4>
                        <input type="text" id="newB" class="input-box mb-4" placeholder="Berber Adı">
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div><small>Açılış</small><input type="time" id="newBS" class="input-box" value="09:00"></div>
                            <div><small>Kapanış</small><input type="time" id="newBE" class="input-box" value="20:00"></div>
                        </div>
                        <button onclick="addB()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold">KAYDET</button>
                    </div>
                    <div id="list-barbers" class="space-y-2"></div>
                </div>
            </div>

            <div id="t-services" class="t-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="admin-card">
                        <h4 class="font-bold mb-4">Hizmet Ekle</h4>
                        <input type="text" id="newSN" class="input-box mb-2" placeholder="Hizmet Adı">
                        <input type="number" id="newSP" class="input-box mb-4" placeholder="Fiyat (TL)">
                        <label class="block mb-4 p-4 border-2 border-dashed rounded-xl text-center cursor-pointer">
                            <span class="text-xs text-slate-400">Hizmet Görseli Seç</span>
                            <input type="file" id="newSImg" hidden onchange="processImg(this, 's')">
                        </label>
                        <button onclick="addS()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">LİSTEYE EKLE</button>
                    </div>
                    <div id="list-services" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>

            <div id="t-gallery" class="t-content hidden">
                <div class="admin-card text-center">
                    <h4 class="font-bold mb-6">Salon Fotoğrafları</h4>
                    <input type="file" id="galInput" multiple onchange="processImg(this, 'g')" class="mb-8">
                    <div id="galGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>

            <div id="t-hours" class="t-content hidden">
                <div class="admin-card text-center">
                    <p class="text-slate-500">Bu bölümde berberler sekmesinden ayarladığınız mesai özetleri listelenir.</p>
                    <div id="hourSummary" class="mt-6 space-y-2"></div>
                </div>
            </div>

            <div id="t-users" class="t-content hidden"><div id="list-users" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
        </div>
    </div>

    <div id="authM" class="fixed inset-0 bg-black/90 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-10 w-full max-w-sm text-center">
            <h3 class="font-black mb-6">ADMİN PANELİ</h3>
            <input type="password" id="adminPass" placeholder="Şifre" class="input-box mb-4 text-center">
            <button onclick="auth()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold mb-4">GİRİŞ</button>
            <button onclick="closeM('authM')" class="text-slate-400 text-xs">İptal</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('at_enterprise_v11')) || {
            barbers: [{name: 'Ahmet Tekeli', s: '09:00', e: '21:00'}],
            services: [{n: 'Saç Kesimi', p: 400, i: ''}],
            apps: [],
            gallery: []
        };
        let tempImg = "";

        const save = () => { localStorage.setItem('at_enterprise_v11', JSON.stringify(db)); render(); };
        const openM = (id) => document.getElementById(id).style.display = 'flex';
        const closeM = (id) => document.getElementById(id).style.display = 'none';

        // GÖRSEL İŞLEME (Base64)
        function processImg(input, type) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                if(type === 's') tempImg = reader.result;
                if(type === 'g') { db.gallery.push(reader.result); save(); }
            }
            if(file) reader.readAsDataURL(file);
        }

        // TAB SİSTEMİ
        function tab(id) {
            document.querySelectorAll('.t-content').forEach(c => c.classList.replace('block', 'hidden'));
            document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.replace('hidden', 'block');
            document.getElementById('btn-'+id).classList.add('active');
        }

        // VERİ İŞLEME
        function addB() {
            const n = document.getElementById('newB').value, s = document.getElementById('newBS').value, e = document.getElementById('newBE').value;
            if(n) { db.barbers.push({name: n, s, e}); save(); document.getElementById('newB').value=""; }
        }

        function addS() {
            const n = document.getElementById('newSN').value, p = document.getElementById('newSP').value;
            if(n && p) { db.services.push({n, p, i: tempImg}); tempImg = ""; save(); document.getElementById('newSN').value=""; }
        }

        function book() {
            const n = document.getElementById('cName').value, p = document.getElementById('cPhone').value, b = document.getElementById('sBarber').value, d = document.getElementById('sDate').value, s = document.getElementById('sService').value;
            if(!n || !p || !window.selT) return alert("Eksik bilgi!");
            db.apps.push({id: Date.now(), name: n, phone: p, barber: b, service: s, date: d, time: window.selT});
            save(); alert("Randevu oluşturuldu!"); location.reload();
        }

        function auth() { if(document.getElementById('adminPass').value === "1234") { closeM('authM'); document.getElementById('adminUI').style.display='block'; } else alert("Şifre Hatalı!"); }

        function loadSlots() {
            const grid = document.getElementById('slotGrid');
            const d = document.getElementById('sDate').value, bName = document.getElementById('sBarber').value;
            grid.innerHTML = ""; if(!d || !bName) return;
            const bObj = db.barbers.find(x => x.name === bName);
            let curr = new Date(`${d}T${bObj.s}`), end = new Date(`${d}T${bObj.e}`);
            while(curr < end) {
                let t = curr.toTimeString().substring(0,5);
                let busy = db.apps.some(a => a.date === d && a.time === t && a.barber === bName);
                let div = document.createElement('div');
                div.className = `slot ${busy ? 'slot-busy' : 'bg-white shadow-sm'}`;
                div.innerText = t;
                if(!busy) div.onclick = () => { document.querySelectorAll('.slot').forEach(s => s.classList.remove('slot-selected')); div.classList.add('slot-selected'); window.selT = t; };
                grid.appendChild(div);
                curr.setMinutes(curr.getMinutes() + 30);
            }
        }

        function render() {
            document.getElementById('sBarber').innerHTML = db.barbers.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
            document.getElementById('sService').innerHTML = db.services.map(s => `<option value="${s.n}">${s.n} (${s.p} TL)</option>`).join('');
            
            // Randevu Render
            document.getElementById('list-apps').innerHTML = db.apps.sort((a,b)=>a.date.localeCompare(b.date)).map(a => `
                <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm">
                    <div><b>${a.name}</b><br><small class="text-slate-400 font-bold uppercase text-[9px]">${a.date} | ${a.time} | ${a.barber}</small></div>
                    <button onclick="db.apps=db.apps.filter(x=>x.id!==${a.id}); save();" class="text-red-500 font-black">X</button>
                </div>
            `).join('');

            // Berber Render
            document.getElementById('list-barbers').innerHTML = db.barbers.map((b,i) => `
                <div class="bg-white p-4 rounded-xl flex justify-between items-center border">
                    <div><b>${b.name}</b><br><small class="text-slate-400 font-bold">${b.s} - ${b.e}</small></div>
                    <button onclick="db.barbers.splice(${i},1); save();" class="text-red-500 text-xs font-bold">Sil</button>
                </div>
            `).join('');

            // Hizmet Render
            document.getElementById('list-services').innerHTML = db.services.map((s,i) => `
                <div class="bg-white p-3 rounded-xl flex items-center gap-4 border">
                    <img src="${s.i || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1"><b>${s.n}</b><br><small class="text-green-600 font-bold">${s.p} TL</small></div>
                    <button onclick="db.services.splice(${i},1); save();" class="text-red-400">Sil</button>
                </div>
            `).join('');

            // Galeri Render
            document.getElementById('galGrid').innerHTML = db.gallery.map((img, i) => `
                <div class="relative group aspect-square">
                    <img src="${img}" class="w-full h-full object-cover rounded-xl border">
                    <button onclick="db.gallery.splice(${i},1); save();" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-[10px]">X</button>
                </div>
            `).join('');

            // Mesai Özet Render
            document.getElementById('hourSummary').innerHTML = db.barbers.map(b => `<div class="p-3 bg-blue-50 text-blue-900 rounded-xl text-xs font-bold">${b.name}: ${b.s} - ${b.e}</div>`).join('');
            
            // Müşteri Render
            const clients = [...new Set(db.apps.map(a => a.phone))];
            document.getElementById('list-users').innerHTML = clients.map(c => `<div class="bg-white p-4 rounded-xl shadow-sm text-center"><b>${db.apps.find(x=>x.phone===c).name}</b><br><small>${c}</small></div>`).join('');
        }
        render();
    </script>
</body>
</html>
