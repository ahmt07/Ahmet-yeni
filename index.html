<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli | Premium Barber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }
        /* Görseldeki Ana Panel */
        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px; width: 92%; max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.9);
            border: none; border-radius: 12px;
            padding: 12px 16px; width: 100%;
            color: #1e3a8a; font-size: 15px; margin-top: 6px;
        }
        .label-text {
            color: #1e3a8a; font-weight: 700; font-size: 14px; margin-top: 15px; display: block;
        }
        .btn-gold {
            background: linear-gradient(to bottom, #d4a373, #a67c52);
            color: white; font-weight: 700; text-transform: uppercase;
            width: 100%; padding: 16px; border-radius: 15px; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(166, 124, 82, 0.4);
        }
        /* Üst Butonlar: Admin ve Sorgulama */
        .top-nav-btn {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px; border-radius: 12px;
            font-weight: 700; font-size: 12px; color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .top-nav-btn:hover { background: #fff; transform: translateY(-2px); }

        .slot-btn {
            background: rgba(255, 255, 255, 0.8); border-radius: 8px;
            padding: 8px; text-align: center; font-size: 13px; font-weight: 600;
            color: #1e3a8a; cursor: pointer;
        }
        .slot-selected { background: #1e3a8a !important; color: white !important; }
        .slot-busy { opacity: 0.3; text-decoration: line-through; pointer-events: none; }

        /* Modal (Giriş Panelleri için) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="fixed top-6 right-6 flex gap-3 z-50">
        <button onclick="openModal('searchModal')" class="top-nav-btn">Randevu Sorgula</button>
        <button onclick="openModal('adminModal')" class="top-nav-btn">Admin Girişi</button>
    </div>

    <div id="mainForm" class="glass-container text-center">
        <div class="absolute -top-16 left-1/2 -translate-x-1/2">
            <img src="logo.png" class="w-32 h-32 rounded-full border-4 border-white shadow-xl" onerror="this.src='https://via.placeholder.com/128?text=LOGO'">
        </div>

        <div class="mt-16">
            <h1 class="text-3xl font-bold text-[#1e3a8a] tracking-tight uppercase">AHMET TEKELİ</h1>
            <p class="text-[#1e3a8a] text-sm font-semibold tracking-[4px] opacity-80 uppercase">Erkek Kuaförü</p>
            <div class="flex justify-center items-center mt-2 text-yellow-500 font-bold">
                ⭐ 4.8 <span class="text-[#1e3a8a]/60 text-xs ml-1 font-normal">(164 Değerlendirme)</span>
            </div>
        </div>

        <div class="text-left mt-6">
            <label class="label-text">Ad Soyad</label>
            <input type="text" id="cName" placeholder="Adınız ve Soyadınız" class="input-field">

            <label class="label-text">Telefon</label>
            <input type="tel" id="cPhone" placeholder="05XXXXXXXXX" class="input-field">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Berber Seçimi</label>
                    <select id="sBarber" onchange="loadSlots()" class="input-field">
                        <option value="">Berber seçin</option>
                        <option value="Ahmet Tekeli">Ahmet Tekeli</option>
                        <option value="Mehmet Usta">Mehmet Usta</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">İşlem Seçimi</label>
                    <select id="sService" class="input-field">
                        <option value="">Hizmet seçin</option>
                        <option value="Saç Kesimi">Saç Kesimi</option>
                        <option value="Sakal Tıraşı">Sakal Tıraşı</option>
                        <option value="Saç & Sakal">Saç & Sakal</option>
                    </select>
                </div>
            </div>

            <label class="label-text">Tarih</label>
            <input type="date" id="sDate" onchange="loadSlots()" class="input-field">

            <label class="label-text">Saat Seçimi</label>
            <div id="slotGrid" class="grid grid-cols-4 gap-2 mt-2">
                <p class="col-span-4 text-[10px] text-[#1e3a8a]/50 italic">Lütfen berber ve tarih seçiniz.</p>
            </div>
        </div>

        <button onclick="createBooking()" class="btn-gold">RANDEVU AL</button>
        
        <p class="mt-4 text-[10px] text-[#1e3a8a]/40 uppercase tracking-widest">Designed by Oğuzhan Gümüş</p>
    </div>

    <div id="searchModal" class="modal-overlay">
        <div class="modal-content animate-in zoom-in duration-300">
            <h2 class="text-xl font-bold text-[#1e3a8a] mb-4">Randevumu Bul</h2>
            <p class="text-xs text-gray-500 mb-4">Kayıtlı telefon numaranızı giriniz.</p>
            <input type="tel" id="qPhone" placeholder="05XXXXXXXXX" class="input-field border border-gray-200 mb-4 text-center">
            <button onclick="findBooking()" class="btn-gold !mt-0 mb-3">SORGULA</button>
            <div id="searchResult" class="text-sm py-3 hidden bg-gray-50 rounded-xl border border-gray-100 mb-4"></div>
            <button onclick="closeModal('searchModal')" class="text-xs text-gray-400 font-bold uppercase">Kapat</button>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-[#1e3a8a] mb-4">Yönetici Girişi</h2>
            <input type="password" id="adminPass" placeholder="Şifre" class="input-field border border-gray-200 mb-4 text-center">
            <button onclick="checkAdmin()" class="btn-gold !mt-0 mb-4">GİRİŞ YAP</button>
            <button onclick="closeModal('adminModal')" class="text-xs text-gray-400 font-bold uppercase">İptal</button>
        </div>
    </div>

    <div id="adminPanel" class="modal-overlay !items-start pt-10 overflow-y-auto">
        <div class="modal-content !max-w-2xl text-left">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-[#1e3a8a]">Randevular</h2>
                <button onclick="closeModal('adminPanel')" class="bg-red-50 text-red-500 p-2 rounded-full px-4 text-xs font-bold">Kapat</button>
            </div>
            <div id="adminList" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        // VERİ YÖNETİMİ
        let state = JSON.parse(localStorage.getItem('barber_data_v4')) || { apps: [] };

        function save() {
            localStorage.setItem('barber_data_v4', JSON.stringify(state));
            renderAdmin();
        }

        // MODAL KONTROLLERİ
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // SAAT SLOTLARI
        function loadSlots() {
            const grid = document.getElementById('slotGrid');
            const date = document.getElementById('sDate').value;
            const barber = document.getElementById('sBarber').value;
            grid.innerHTML = "";
            if(!date || !barber) return;

            const hours = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30"];

            hours.forEach(h => {
                const busy = state.apps.some(a => a.date === date && a.time === h && a.barber === barber);
                const btn = document.createElement('div');
                btn.className = `slot-btn ${busy ? 'slot-busy' : ''}`;
                btn.innerText = h;
                if(!busy) {
                    btn.onclick = () => {
                        document.querySelectorAll('.slot-btn').forEach(x => x.classList.remove('slot-selected'));
                        btn.classList.add('slot-selected');
                        window.selectedTime = h;
                    };
                }
                grid.appendChild(btn);
            });
        }

        // RANDEVU OLUŞTUR
        function createBooking() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const date = document.getElementById('sDate').value;
            const barber = document.getElementById('sBarber').value;
            const service = document.getElementById('sService').value;

            if(!name || !phone || !window.selectedTime) return alert("Lütfen tüm alanları seçiniz!");

            state.apps.push({ id: Date.now(), name, phone, date, time: window.selectedTime, barber, service });
            save();
            alert("Randevunuz başarıyla oluşturuldu.");
            location.reload();
        }

        // RANDEVU SORGULA
        function findBooking() {
            const phone = document.getElementById('qPhone').value;
            const app = state.apps.filter(a => a.phone === phone).pop();
            const res = document.getElementById('searchResult');
            res.classList.remove('hidden');
            if(app) {
                res.innerHTML = `<b>Sn. ${app.name}</b><br>${app.date} - ${app.time}<br><small>${app.service} | ${app.barber}</small>`;
            } else {
                res.innerHTML = "Randevu bulunamadı.";
            }
        }

        // ADMIN GİRİŞ
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "1234") {
                closeModal('adminModal');
                openModal('adminPanel');
                renderAdmin();
            } else { alert("Hatalı Şifre!"); }
        }

        // ADMIN LİSTESİ
        function renderAdmin() {
            const list = document.getElementById('adminList');
            list.innerHTML = state.apps.sort((a,b) => a.date.localeCompare(b.date)).map(a => `
                <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center border border-gray-100">
                    <div>
                        <div class="font-bold text-[#1e3a8a] text-sm">${a.name}</div>
                        <div class="text-[10px] text-gray-500">${a.date} | ${a.time} | ${a.barber}</div>
                    </div>
                    <button onclick="deleteApp(${a.id})" class="text-red-400 font-bold text-xs">SİL</button>
                </div>
            `).join('');
        }

        function deleteApp(id) {
            if(confirm('Silinsin mi?')) {
                state.apps = state.apps.filter(a => a.id !== id);
                save();
            }
        }
    </script>
</body>
</html>
