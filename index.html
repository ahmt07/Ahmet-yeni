<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli Erkek Kuaförü | Yönetim ve Randevu</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a1a">

    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --sidebar: #252525; --gray: #f4f4f4; --white: #ffffff; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--gray); color: var(--dark); overflow-x: hidden; }
        
        /* Genel UI Elemanları */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); }
        .btn-gold:hover { background: var(--gold); color: white; }
        .input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 10px auto; max-width: 500px; }
        
        /* Admin Sidebar & Layout */
        #admin-container { display: none; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--sidebar); color: white; position: fixed; height: 100%; padding-top: 20px; }
        .sidebar h2 { text-align: center; color: var(--gold); font-size: 18px; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #333; }
        .nav-item:hover { background: var(--gold); color: var(--dark); }
        .admin-content { margin-left: 240px; padding: 30px; width: calc(100% - 240px); }

        /* Müşteri Panel Tasarımı */
        #customer-container { padding: 20px; }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area h1 { margin: 0; letter-spacing: 2px; }
        .app-item { background: white; border-left: 5px solid var(--gold); padding: 15px; margin-bottom: 10px; border-radius: 8px; position: relative; }
        
        /* Toast Mesaj */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 30px; color: white; display: none; z-index: 10000; font-weight: bold; }
        
        @media (max-width: 768px) {
            .sidebar { width: 60px; } .sidebar h2, .nav-item span { display: none; }
            .admin-content { margin-left: 60px; width: calc(100% - 60px); }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="customer-container">
    <div class="card logo-area">
        <h1>AHMET TEKELİ</h1>
        <small>ERKEK KUAFÖRÜ</small>
        <button id="btnPWA" class="btn" style="display:none; background:#28a745; color:white; margin-top:10px; width:100%;">📲 Uygulamayı Yükle</button>
    </div>

    <div id="cust-login" class="card">
        <h3>Müşteri Girişi</h3>
        <input type="tel" id="loginPhone" class="input" placeholder="Telefon (5xx...)" maxlength="10">
        <input type="password" id="loginPass" class="input" placeholder="Şifreniz">
        <div style="text-align:right"><button onclick="forgotPasswordOTP()" style="background:none; border:none; color:var(--gold); cursor:pointer;">Şifremi Unuttum?</button></div>
        <button class="btn btn-gold" style="width:100%; margin-top:10px;" onclick="doLogin()">Giriş Yap</button>
        <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="toggleAuth(true)">Yeni Kayıt</button>
    </div>

    <div id="cust-register" class="card" style="display:none;">
        <h3>Yeni Kayıt</h3>
        <input type="text" id="regName" class="input" placeholder="Ad Soyad">
        <input type="tel" id="regPhone" class="input" placeholder="Telefon (5xx...)" maxlength="10">
        <input type="password" id="regPass" class="input" placeholder="Şifre Oluşturun">
        <button class="btn btn-gold" style="width:100%;" onclick="doRegister()">Kayıt Ol ve Giriş Yap</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="toggleAuth(false)">Geri Dön</button>
    </div>

    <div id="cust-panel" style="display:none;">
        <div class="card">
            <h4>Selam, <span id="welcomeName">...</span></h4>
            <button class="btn btn-gold" style="width:100%" onclick="window.location.href='/randevu-al.html'">Yeni Randevu Al</button>
        </div>
        <div class="card">
            <h3>Randevularım</h3>
            <div id="my-apps-list"></div>
            <button class="btn" style="width:100%; margin-top:20px; border:1px solid #ddd;" onclick="doLogout()">Güvenli Çıkış</button>
        </div>
    </div>
</div>

<div id="admin-container">
    <div class="sidebar">
        <h2>AHMET TEKELİ<br>ADMIN</h2>
        <div class="nav-item" onclick="showAdminTab('adm-apps')">📅 Randevular</div>
        <div class="nav-item" onclick="showAdminTab('adm-barbers')">✂️ Berberler & İzinler</div>
        <div class="nav-item" onclick="showAdminTab('adm-services')">💈 Hizmetler</div>
        <div class="nav-item" onclick="showAdminTab('adm-stock')">📦 Malzeme Stok</div>
        <div class="nav-item" onclick="doLogout()" style="color:var(--danger)">🚪 Çıkış</div>
    </div>

    <div class="admin-content">
        <section id="adm-apps" class="adm-sec">
            <div class="card" style="max-width:100%">
                <h3>Tüm Randevular</h3>
                <div id="all-apps-list"></div>
            </div>
        </section>

        <section id="adm-barbers" class="adm-sec" style="display:none;">
            <div class="card" style="max-width:100%">
                <h3>Berber Ekle</h3>
                <div style="display:flex; gap:10px;">
                    <input id="newBarberName" class="input" placeholder="Berber Adı">
                    <button class="btn btn-gold" onclick="addBarber()">Ekle</button>
                </div>
                <hr>
                <h3>İzin Tanımla</h3>
                <div style="display:flex; gap:10px;">
                    <select id="leaveBarberSelect" class="input"></select>
                    <input id="leaveDate" type="date" class="input">
                    <button class="btn btn-gold" onclick="addLeave()">İzinli Yap</button>
                </div>
            </div>
        </section>

        <section id="adm-stock" class="adm-sec" style="display:none;">
            <div class="card" style="max-width:100%">
                <h3>Malzeme Stok Takibi</h3>
                <div style="display:flex; gap:10px;">
                    <input id="stockItem" class="input" placeholder="Ürün (Jilet, Havlu...)">
                    <input id="stockQty" type="number" class="input" placeholder="Adet">
                    <button class="btn btn-gold" onclick="updateStock()">Stoğu Güncelle</button>
                </div>
                <div id="stock-list"></div>
            </div>
        </section>
    </div>
</div>



<script type="module">
    // Firebase Importları (Gereken her şey tek modülde)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, getDocs, addDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // KENDİ CONFIG BİLGİLERİNİZİ BURAYA EKLEYİN
    const firebaseConfig = { apiKey: "...", projectId: "ahmet-tekeli", appId: "..." };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COL = { cust: "customers", apps: "appointments", barb: "barbers", stock: "inventory", leave: "leaves" };

    // --- PWA MANTIĞI ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('btnPWA').style.display = 'block';
    });
    document.getElementById('btnPWA').onclick = async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    };

    // --- GİRİŞ / KAYIT / ŞİFRE ---
    window.doLogin = async () => {
        const phone = document.getElementById("loginPhone").value.replace(/\D/g, "").slice(-10);
        const pass = document.getElementById("loginPass").value;
        
        // ADMIN KONTROLÜ (Örn: Senin numaran admin olsun)
        if(phone === "5350000000" && pass === "admin123") {
            showAdminMode();
            return;
        }

        const snap = await getDoc(doc(db, COL.cust, phone));
        if (snap.exists() && snap.data().pass === pass) {
            startSession(snap.data());
        } else {
            showToast("Hatalı bilgiler!", "err");
        }
    };

    window.forgotPasswordOTP = async () => {
        const phone = document.getElementById("loginPhone").value.replace(/\D/g, "").slice(-10);
        if(phone.length < 10) return showToast("Telefon girin!", "err");
        
        const otp = Math.floor(100000 + Math.random() * 900000);
        window.open(`https://wa.me/90${phone}?text=Ahmet Tekeli Şifre Kodunuz: *${otp}*`, '_blank');
        
        setTimeout(async () => {
            const input = prompt("Kodu girin:");
            if(input == otp) {
                const newP = prompt("Yeni şifreniz:");
                await updateDoc(doc(db, COL.cust, phone), { pass: newP });
                showToast("Şifre güncellendi!", "ok");
            }
        }, 1000);
    };

    // --- ADMIN FONKSİYONLARI ---
    window.showAdminTab = (tabId) => {
        document.querySelectorAll('.adm-sec').forEach(s => s.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        if(tabId === 'adm-stock') loadStock();
        if(tabId === 'adm-barbers') loadBarberData();
    };

    window.updateStock = async () => {
        const item = document.getElementById("stockItem").value;
        const qty = parseInt(document.getElementById("stockQty").value);
        await setDoc(doc(db, COL.stock, item), { item, qty, updatedAt: new Date() });
        loadStock();
    };

    async function loadStock() {
        const snap = await getDocs(collection(db, COL.stock));
        let h = "<table><tr><th>Ürün</th><th>Adet</th><th>Durum</th></tr>";
        snap.forEach(d => {
            const s = d.data();
            const color = s.qty < 5 ? "red" : "green";
            h += `<tr><td>${s.item}</td><td style="color:${color}">${s.qty}</td><td>${s.qty < 5 ? 'AZALDI' : 'TAMAM'}</td></tr>`;
        });
        document.getElementById("stock-list").innerHTML = h + "</table>";
    }

    // --- YARDIMCI ---
    function showToast(m, type) {
        const t = document.getElementById("toast");
        t.innerText = m; t.style.background = type === "err" ? "#e74c3c" : "#28a745";
        t.style.display = "block"; setTimeout(() => t.style.display = "none", 3000);
    }
    window.toggleAuth = (reg) => {
        document.getElementById("cust-login").style.display = reg ? "none" : "block";
        document.getElementById("cust-register").style.display = reg ? "block" : "none";
    };
    function startSession(user) {
        document.getElementById("customer-container").style.display = "block";
        document.getElementById("cust-login").style.display = "none";
        document.getElementById("cust-panel").style.display = "block";
        document.getElementById("welcomeName").innerText = user.name;
        localStorage.setItem("userPhone", user.phone);
    }
    function showAdminMode() {
        document.getElementById("customer-container").style.display = "none";
        document.getElementById("admin-container").style.display = "block";
    }
    window.doLogout = () => { localStorage.clear(); location.reload(); };

</script>
</body>
</html>
