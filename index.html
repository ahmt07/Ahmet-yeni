<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli | Premium Barber</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #1a1a1a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 30px 0; }
        .logo { width: 80px; height: 80px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 35px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 380px; box-sizing: border-box; border: 1px solid #333; }
        .input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: black; }
        .app-item { background: #252525; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--gold); }
        #toast { position: fixed; bottom: 20px; background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">✂️</div>
        <h1 style="color:var(--gold); margin:0; letter-spacing:2px;">AHMET TEKELİ</h1>
        <small style="letter-spacing:4px; color:#888;">ERKEK KUAFÖRÜ</small>
    </div>

    <div class="card" id="auth-view">
        <div id="login-form">
            <input type="tel" id="lPhone" class="input" placeholder="Telefon (5xx...)" maxlength="10">
            <input type="password" id="lPass" class="input" placeholder="Şifre">
            <button class="btn btn-gold" id="btnLogin">GİRİŞ YAP</button>
            <button class="btn" style="background:transparent; color:var(--gold);" id="btnGoReg">Kayıt Ol</button>
            <center><a href="#" id="btnForgot" style="color:#666; font-size:12px; text-decoration:none;">Şifremi Unuttum</a></center>
        </div>

        <div id="reg-form" style="display:none;">
            <input type="text" id="rName" class="input" placeholder="Ad Soyad">
            <input type="tel" id="rPhone" class="input" placeholder="Telefon" maxlength="10">
            <input type="password" id="rPass" class="input" placeholder="Şifre Oluştur">
            <button class="btn btn-gold" id="btnRegister">KAYIT OL</button>
            <button class="btn" style="background:transparent; color:#888;" id="btnGoLog">Geri Dön</button>
        </div>
    </div>

    <div class="card" id="panel-view" style="display:none;">
        <h3 id="uName">Hoş Geldin</h3>
        <button class="btn btn-gold" onclick="window.location.href='randevu-al.html'">➕ YENİ RANDEVU AL</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="my-apps"></div>
        <button class="btn" style="background:#333; color:white;" id="btnLogout">ÇIKIŞ YAP</button>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- BURAYI KENDİ BİLGİLERİNLE DOLDUR ---
        const firebaseConfig = { 
            apiKey: "AIza...", 
            projectId: "ahmet-tekeli", 
            appId: "..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- BUTONLARI DİNLE (TEPKİ VERMEME SORUNUNUN ÇÖZÜMÜ) ---
        document.getElementById("btnLogin").addEventListener("click", doLogin);
        document.getElementById("btnRegister").addEventListener("click", doRegister);
        document.getElementById("btnGoReg").addEventListener("click", () => toggleView(true));
        document.getElementById("btnGoLog").addEventListener("click", () => toggleView(false));
        document.getElementById("btnLogout").addEventListener("click", logout);
        document.getElementById("btnForgot").addEventListener("click", forgotPass);

        // --- FONKSİYONLAR ---
        async function doLogin() {
            const p = document.getElementById("lPhone").value.trim();
            const pass = document.getElementById("lPass").value;
            if(!p || !pass) return showMsg("Alanları doldurun!");

            try {
                const snap = await getDoc(doc(db, "customers", p));
                if(snap.exists() && snap.data().pass === pass) {
                    startSession(snap.data());
                } else {
                    showMsg("Hatalı bilgiler!");
                }
            } catch(e) { showMsg("Hata: " + e.message); }
        }

        async function doRegister() {
            const n = document.getElementById("rName").value;
            const p = document.getElementById("rPhone").value;
            const pass = document.getElementById("rPass").value;
            if(n.length < 3 || p.length < 10) return showMsg("Geçerli bilgiler girin!");

            await setDoc(doc(db, "customers", p), { name: n, phone: p, pass: pass });
            showMsg("Kayıt başarılı!");
            startSession({ name: n, phone: p });
        }

        async function forgotPass() {
            const p = document.getElementById("lPhone").value;
            if(p.length < 10) return showMsg("Önce telefon girin!");
            const otp = Math.floor(100000 + Math.random() * 900000);
            window.open(`https://wa.me/90${p}?text=Ahmet Tekeli Kodunuz: *${otp}*`);
            const input = prompt("Kodu girin:");
            if(input == otp) {
                const newP = prompt("Yeni şifre:");
                await updateDoc(doc(db, "customers", p), { pass: newP });
                showMsg("Şifre güncellendi!");
            }
        }

        function startSession(user) {
            localStorage.setItem("at_user", user.phone);
            document.getElementById("uName").innerText = "Selam, " + user.name;
            document.getElementById("auth-view").style.display = "none";
            document.getElementById("panel-view").style.display = "block";
            loadApps(user.phone);
        }

        async function loadApps(phone) {
            const q = query(collection(db, "appointments"), where("customerPhone", "==", phone));
            const snap = await getDocs(q);
            let h = "<h4>Randevularım</h4>";
            snap.forEach(d => {
                const a = d.data();
                h += `<div class="app-item">
                    <b>📅 ${a.date} | ⏰ ${a.time}</b><br>
                    <button onclick="window.delApp('${d.id}')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">İptal Et</button>
                </div>`;
            });
            document.getElementById("my-apps").innerHTML = h;
        }

        // İptal butonunu global yapıyoruz
        window.delApp = async (id) => {
            if(confirm("Emin misiniz?")) {
                await deleteDoc(doc(db, "appointments", id));
                showMsg("İptal edildi.");
                loadApps(localStorage.getItem("at_user"));
            }
        };

        function toggleView(reg) {
            document.getElementById("login-form").style.display = reg ? "none" : "block";
            document.getElementById("reg-form").style.display = reg ? "block" : "none";
        }

        function showMsg(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
