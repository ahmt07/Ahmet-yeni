<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ahmet Tekeli Erkek Kuaförü | Randevu</title>
  <meta name="theme-color" content="#111111">
  <style>
    :root{
      --bg:#0f0f10; --dark:#141414; --card:#fff; --text:#151515; --muted:#8b8b8b;
      --line:#ededed; --gold:#b3872f; --danger:#d94141; --ok:#1f8f4f;
      --shadow: 0 16px 40px rgba(0,0,0,.18);
      --radius:14px;
      --safeTop: env(safe-area-inset-top);
      --safeBottom: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(179,135,47,.16), transparent 45%),
        radial-gradient(900px 500px at 80% 10%, rgba(255,255,255,.08), transparent 40%),
        linear-gradient(180deg, #0d0d0e, #101113);
      color:#fff; overflow:hidden;
    }
    .app{height:100%;display:flex;align-items:center;justify-content:center;padding:18px 12px}
    .phone{
      width:min(420px,100%);
      height:min(860px,100%);
      background:#0f0f10;
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden; position:relative;
      border:1px solid rgba(255,255,255,.08);
    }

    /* ✅ Topbar */
    .topbar{
      height:64px;
      padding-top: calc(10px + var(--safeTop));
      padding-left:14px; padding-right:14px;
      display:flex; align-items:flex-end; justify-content:space-between;
      background: linear-gradient(180deg, #171717, #141414);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .topbar.hidden{display:none}
    .topbar .left, .topbar .right{display:flex;align-items:center;gap:10px;min-width:56px}
    .topbar .title{flex:1;text-align:center;font-weight:900;letter-spacing:.8px;opacity:.95}
    .iconbtn{
      width:38px;height:38px;border-radius:12px;
      display:grid;place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      cursor:pointer;user-select:none;
    }
    .iconbtn:active{transform:scale(.98)}
    .iconbtn svg{width:20px;height:20px;fill:#fff;opacity:.92}

    .content{
      height: calc(100% - 64px);
      overflow:auto;
      background:#f7f7f7;
      color:var(--text);
      padding-bottom: calc(16px + var(--safeBottom));
    }
    .content.full{height:100%}

    /* ✅ Home */
    .home-hero{
      min-height: 440px;
      position:relative;
      background:
        linear-gradient(0deg, rgba(0,0,0,.58), rgba(0,0,0,.15)),
        radial-gradient(1200px 700px at 40% 0%, rgba(255,255,255,.10), transparent 55%),
        linear-gradient(180deg, #2b2b2b, #151515);
      display:flex; flex-direction:column;
      justify-content:space-between; align-items:center;
      color:#fff; overflow:hidden;
      padding: 26px 16px 16px;
    }
    .home-hero::before{
      content:""; position:absolute; inset:-40px;
      background:
        radial-gradient(closest-side at 70% 30%, rgba(255,255,255,.10), transparent 70%),
        radial-gradient(closest-side at 25% 25%, rgba(255,255,255,.08), transparent 70%);
      opacity:.9;
    }
    .brand{position:relative;text-align:center;padding:0 18px}
    .logo-badge{
      width: 240px;height: 132px;
      border: 4px solid rgba(255,255,255,.86);
      border-radius: 999px;
      margin:0 auto 14px;
      display:flex;align-items:center;justify-content:center;
      background: rgba(0,0,0,.10);
      backdrop-filter: blur(2px);
    }
    .brand h1{margin:0;font-size:34px;letter-spacing:4px;font-weight:950;text-transform:uppercase}
    .brand .sub{margin-top:8px;font-size:14px;opacity:.88;font-weight:800}
    .logo-svg{width:190px;height:80px;opacity:.95}

    .home-menu{
      position:static; width:100%;
      background: linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.62));
      padding: 14px 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
    }
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px}
    .grid .item{display:flex;flex-direction:column;align-items:center;gap:8px;color:#fff;text-decoration:none;cursor:pointer;user-select:none}
    .grid .item .gicon{
      width:52px;height:52px;border-radius:16px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.06);
      box-shadow: 0 10px 18px rgba(0,0,0,.16);
    }
    .grid .item .gicon svg{width:26px;height:26px;fill:#fff;opacity:.92}
    .grid .item .label{font-size:11px;letter-spacing:.6px;opacity:.95;text-transform:uppercase;font-weight:800}

    /* Lists / Sections */
    .rowTitle{padding:14px 16px 10px;background:#fff;border-bottom:1px solid #eee;font-weight:900;letter-spacing:.6px;text-transform:uppercase}
    .section{padding:14px 16px;background:#fff;border-bottom:1px solid #eee}
    .pad{padding:14px 16px}
    .hint{font-size:12px;color:#8c8c8c;font-weight:800;margin-top:6px}
    .hr{height:10px;background:#f1f1f1}
    .list{background:#fff}
    .row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #ededed;gap:12px}
    .row .name{font-weight:900;color:var(--gold)}
    .row .price{font-weight:900;color:#9a9a9a;min-width:64px;text-align:right}
    .row .meta{font-size:12px;color:#9c9c9c;margin-top:4px;font-weight:800}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:14px 16px;border-radius:14px;border:1px solid transparent;
      font-weight:950;letter-spacing:.6px;cursor:pointer;user-select:none;
    }
    .btn:active{transform:scale(.99)}
    .btn.primary{background:var(--gold);color:#fff;box-shadow:0 10px 24px rgba(179,135,47,.25)}
    .btn.ghost{background:#fff;border-color:#e6e6e6;color:#2b2b2b}
    .btn.danger{background:#fff;border-color:#f0c7c7;color:var(--danger)}
    .btn.ok{background:#fff;border-color:#cfe9d8;color:var(--ok)}
    .btn.full{width:100%}
    .btn.sm{padding:10px 12px;border-radius:12px;font-weight:950;letter-spacing:.2px}

    /* Booking service select */
    .srow{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #ededed;gap:12px;cursor:pointer;user-select:none;background:#fff}
    .sleft{display:flex;gap:12px;align-items:flex-start}
    .radio{width:22px;height:22px;border-radius:999px;border:2px solid #c9b08a;display:grid;place-items:center;margin-top:2px;flex:0 0 auto}
    .radio .dot{width:12px;height:12px;border-radius:999px;background:var(--gold);display:none}
    .srow.selected .radio{border-color:var(--gold)}
    .srow.selected .radio .dot{display:block}
    .stitle{font-weight:950;color:#2b2b2b}
    .sdur{font-size:12px;color:#9a9a9a;font-weight:800;margin-top:4px}
    .sprice{font-weight:950;color:#7f7f7f;min-width:64px;text-align:right}

    /* Date strip */
    .dateStrip{background:#fff;padding:14px 14px 6px;border-bottom:1px solid #eee}
    .hTitle{font-weight:950;letter-spacing:.6px;margin-bottom:10px;text-transform:uppercase}
    .dates{display:flex;gap:10px;overflow:auto;padding-bottom:8px}
    .dateCard{width:66px;flex:0 0 auto;border-radius:12px;border:1px solid #ececec;background:#fff;padding:10px;text-align:center;cursor:pointer;user-select:none}
    .dateCard .d1{font-weight:950;font-size:12px;color:#8c8c8c}
    .dateCard .d2{font-weight:950;font-size:18px;color:#2b2b2b;margin-top:4px}
    .dateCard .d3{font-weight:900;font-size:12px;color:#a0a0a0;margin-top:4px}
    .dateCard.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.10)}
    .dateCard.active .d1,.dateCard.active .d3{color:rgba(179,135,47,.95)}
    .dateCard.active .d2{color:var(--gold)}

    /* Staff cards */
    .staffWrap{padding:14px 14px 2px;background:#fff;border-bottom:1px solid #eee}
    .staffs{display:flex;gap:12px;overflow:auto;padding-bottom:10px}
    .staffCard{width:120px;flex:0 0 auto;border-radius:14px;border:1px solid #ececec;background:#fff;padding:12px 10px;text-align:center;cursor:pointer;user-select:none}
    .avatar{width:60px;height:60px;border-radius:999px;background: radial-gradient(circle at 30% 30%, #fff, #e9e9e9);border: 1px solid #e6e6e6;display:grid;place-items:center;margin:0 auto 8px;overflow:hidden}
    .avatar span{font-weight:950;color:#6c6c6c;font-size:18px}
    .staffCard .sname{font-weight:950;color:#2b2b2b}
    .staffCard.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.12)}

    /* Times */
    .timeWrap{padding:14px;background:#fff;border-bottom:1px solid #eee}
    .times{display:flex;gap:10px;overflow:auto;padding-bottom:4px}
    .tchip{min-width:76px;padding:12px;border-radius:12px;background:#dcdcdc;color:#fff;font-weight:950;text-align:center;cursor:pointer;user-select:none;flex:0 0 auto}
    .tchip.available{background:#a9a9a9}
    .tchip.active{background:var(--gold)}
    .tchip.disabled{background:#ececec;color:#bdbdbd;cursor:not-allowed}

    /* Account bookings */
    .tabs{display:flex;background:#262626;color:#fff}
    .tab{flex:1;text-align:center;padding:12px 10px;font-weight:950;cursor:pointer;user-select:none;opacity:.9;border-bottom:3px solid transparent}
    .tab.active{background:#2f2f2f;border-bottom-color:var(--gold);opacity:1}
    .bcard{background:#fff;padding:16px;border-bottom:1px solid #eee}
    .bhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .bday{font-weight:950;font-size:26px;color:#2b2b2b}
    .bmeta{font-weight:850;color:#7f7f7f;margin-top:6px}
    .bprice{font-weight:950;font-size:28px;color:#2b2b2b;white-space:nowrap}
    .center{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 0 8px}
    .bigAvatar{width:90px;height:90px;border-radius:999px;background: radial-gradient(circle at 30% 30%, #fff, #e9e9e9);border: 1px solid #e6e6e6;display:grid;place-items:center;overflow:hidden}
    .bigAvatar span{font-weight:950;color:#6c6c6c;font-size:26px}
    .bname{font-weight:950;font-size:20px;color:#2b2b2b}
    .bline{width:100%;display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-weight:950;gap:12px}
    .muted{color:#8c8c8c;font-weight:950}

    /* Forms */
    .form{padding:14px 16px;background:#fff;border-bottom:1px solid #eee}
    .field{margin-bottom:10px}
    label{display:block;font-size:12px;font-weight:950;color:#7e7e7e;margin-bottom:6px}
    input, select, textarea{
      width:100%;padding:12px;border-radius:12px;border:1px solid #e6e6e6;outline:none;
      font-weight:850;font-size:15px;background:#fff;
    }
    textarea{min-height:84px;resize:vertical}
    input:focus, select:focus, textarea:focus{border-color:rgba(179,135,47,.55)}

    /* Admin chips */
    .subtabs{display:flex;gap:10px;overflow:auto;background:#fff;border-bottom:1px solid #eee;padding:10px 12px}
    .chip{flex:0 0 auto;padding:10px 12px;border-radius:999px;border:1px solid #e6e6e6;background:#fff;font-weight:950;color:#2b2b2b;cursor:pointer;user-select:none;white-space:nowrap}
    .chip.active{border-color:rgba(179,135,47,.55);background:rgba(179,135,47,.10);color:var(--gold)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}
    .toolbar input{flex:1;min-width:160px}

    /* Gallery */
    .ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .gitem{background:#f3f3f3;border:1px solid #ededed;border-radius:14px;overflow:hidden;position:relative}
    .gitem img{width:100%;height:110px;object-fit:cover;display:block}
    .gcap{padding:8px 10px;font-weight:900;color:#444;font-size:12px}
    .gdel{
      position:absolute; top:8px; right:8px;
      background:rgba(0,0,0,.55); color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:12px; padding:6px 8px;
      font-weight:950; cursor:pointer; user-select:none;
    }

    .toast{
      position:absolute;left:14px;right:14px;bottom: calc(16px + var(--safeBottom));
      background: rgba(20,20,20,.92);color:#fff;padding:12px 14px;border-radius:14px;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
      display:none;z-index:50;border:1px solid rgba(255,255,255,.08);
      font-weight:950;
    }
    .toast.show{display:block}
    .toast small{opacity:.8;font-weight:850}

    @media (max-height:740px){
      .brand h1{font-size:28px}
      .home-hero{min-height:420px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="phone" id="phone">
    <div class="topbar" id="topbar">
      <div class="left">
        <div class="iconbtn" id="backBtn" title="Geri">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 1 0 1.4L10.41 12l4.29 4.3a1 1 0 1 1-1.4 1.4l-5-5a1 1 0 0 1 0-1.4l5-5a1 1 0 0 1 1.4 0z"/></svg>
        </div>
      </div>
      <div class="title" id="topTitle">MENÜ</div>
      <div class="right">
        <div class="iconbtn" id="homeBtn" title="Ana Sayfa">
          <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"/></svg>
        </div>
      </div>
    </div>

    <div class="content" id="content"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
/* =========================
   0) AYARLAR
========================= */
const CONFIG = {
  brandName: "Ahmet Tekeli Erkek Kuaförü",
  brandShort: "AHMET TEKELİ",
  slogan: "Erkeğin makyajı saçı sakalıdır",
  phone: "+90 5XX XXX XX XX",
  whatsapp: "+90 5XX XXX XX XX",
  instagram: "@esnafmuhabbeti",
  address: "Antalya / Muratpaşa (Adresini buraya yaz)",
  mapUrl: "https://maps.google.com/?q=Antalya",
  adminPin: "1234"
};

/* =========================
   1) DEMO VERİLER
========================= */
const SEED = {
  services: [
    { id:"svc_hair", name:"Saç Kesimi", price: 350, duration:45 },
    { id:"svc_beard", name:"Sakal Tıraşı", price: 200, duration:15 },
    { id:"svc_kid", name:"Çocuk Tıraşı", price: 300, duration:30 },
    { id:"svc_combo", name:"Saç + Sakal + Yıkama + Fön", price: 550, duration:60 },
    { id:"svc_wash", name:"Saç Yıkama ve Fön", price: 250, duration:15 },
    { id:"svc_tonic", name:"Saç Bakımı (Tonik ile)", price: 250, duration:30 },
    { id:"svc_neck", name:"Ense ve Favori Düzeltme", price: 150, duration:15 },
    { id:"svc_wax", name:"Ağda (Yanak - Kulak)", price: 150, duration:15 },
    { id:"svc_clay", name:"Cilt Bakımı (Kil maske)", price: 300, duration:15 },
    { id:"svc_mineral", name:"Maden Suyu Cilt Bakımı", price: 300, duration:15 },
    { id:"svc_brow", name:"Anatomik Kaş Çizimi", price: 300, duration:15 },
    { id:"svc_black", name:"Black Mask", price: 300, duration:15 },
    { id:"svc_goldmask", name:"Peel Off Gold Mask", price: 350, duration:15 }
  ],
  staff: [
    { id:"st_ahmet", name:"Ahmet Tekeli", role:"Usta" },
    { id:"st_usta2", name:"Usta 2", role:"Berber" },
    { id:"st_usta3", name:"Usta 3", role:"Berber" }
  ],
  workingHours: {
    0: null,
    1: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    2: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    3: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    4: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    5: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] },
    6: { start:"09:00", end:"20:00", breaks:[{start:"13:00", end:"13:30"}] }
  },
  gallery: [
    // örnek:
    // {id:"g1", src:"https://picsum.photos/600/600?1", caption:"Örnek 1", createdAt:new Date().toISOString()}
  ]
};

/* =========================
   2) HELPERS
========================= */
const $ = (s,r=document)=>r.querySelector(s);
const DAYS_TR = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const DAYS_SHORT=["PAZ","PTS","SAL","ÇAR","PER","CUM","CTS"];
const MONTHS_TR=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const pad2=n=>String(n).padStart(2,"0");
const toMin=hhmm=>{const [h,m]=hhmm.split(":").map(Number);return h*60+m;}
const fromMin=min=>`${pad2(Math.floor(min/60))}:${pad2(min%60)}`
const ymd=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const sum=arr=>arr.reduce((a,b)=>a+b,0);
const currencyTry=n=>`${Number(n||0).toLocaleString("tr-TR")} ₺`;
const escapeHtml=s=>String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
const escapeAttr=s=>escapeHtml(s).replaceAll("\n"," ");
const initials=name=>{
  const p=(name||"").trim().split(/\s+/).filter(Boolean);
  if(!p.length) return "•";
  const a=p[0][0]||""; const b=p.length>1?p[p.length-1][0]:(p[0][1]||"");
  return (a+b).toUpperCase();
}
const normPhone=p=>String(p||"").replace(/\D/g,"");
const nowKey=()=>{const d=new Date();return ymd(d)+" "+fromMin(d.getHours()*60+d.getMinutes());}
function toast(msg, sub=""){
  const t=$("#toast");
  t.innerHTML=sub?`${msg}<br><small>${sub}</small>`:msg;
  t.classList.add("show");
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>t.classList.remove("show"),2200);
}
function confirmSafe(msg){ try{return confirm(msg);}catch(e){return true;} }
function downloadText(filename, text, mime="text/plain;charset=utf-8"){
  const blob=new Blob([text],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),800);
}
function toCSV(rows){
  const esc=v=>{
    const s=String(v??"");
    if(s.includes('"')||s.includes(",")||s.includes("\n")||s.includes("\r")) return `"${s.replaceAll('"','""')}"`;
    return s;
  };
  return rows.map(r=>r.map(esc).join(",")).join("\n");
}
function downloadCSV(filename, rows){
  const csv="\ufeff"+toCSV(rows);
  downloadText(filename, csv, "text/csv;charset=utf-8");
}

/* =========================
   3) STORAGE
========================= */
const LS={
  init:"at_init_v5",
  me:"at_me_v5",
  services:"at_services_v5",
  staff:"at_staff_v5",
  hours:"at_hours_v5",
  bookings:"at_bookings_v5",
  customers:"at_customers_v5",
  gallery:"at_gallery_v5"
};
const Store={
  init(){
    if(localStorage.getItem(LS.init)) return;
    localStorage.setItem(LS.services, JSON.stringify(SEED.services));
    localStorage.setItem(LS.staff, JSON.stringify(SEED.staff));
    localStorage.setItem(LS.hours, JSON.stringify(SEED.workingHours));
    localStorage.setItem(LS.bookings, JSON.stringify([]));
    localStorage.setItem(LS.customers, JSON.stringify([]));
    localStorage.setItem(LS.gallery, JSON.stringify(SEED.gallery));
    localStorage.setItem(LS.init, "1");
  },
  resetAll(){
    Object.values(LS).forEach(k=>localStorage.removeItem(k));
    Store.init();
  },

  getMe(){return JSON.parse(localStorage.getItem(LS.me)||"null");},
  setMe(me){localStorage.setItem(LS.me, JSON.stringify(me));},
  clearMe(){localStorage.removeItem(LS.me);},

  getServices(){return JSON.parse(localStorage.getItem(LS.services)||"[]");},
  setServices(a){localStorage.setItem(LS.services, JSON.stringify(a));},

  getStaff(){return JSON.parse(localStorage.getItem(LS.staff)||"[]");},
  setStaff(a){localStorage.setItem(LS.staff, JSON.stringify(a));},

  getHours(){return JSON.parse(localStorage.getItem(LS.hours)||"null");},
  setHours(o){localStorage.setItem(LS.hours, JSON.stringify(o));},

  getBookings(){return JSON.parse(localStorage.getItem(LS.bookings)||"[]");},
  setBookings(a){localStorage.setItem(LS.bookings, JSON.stringify(a));},

  getCustomers(){return JSON.parse(localStorage.getItem(LS.customers)||"[]");},
  setCustomers(a){localStorage.setItem(LS.customers, JSON.stringify(a));},

  getGallery(){return JSON.parse(localStorage.getItem(LS.gallery)||"[]");},
  setGallery(a){localStorage.setItem(LS.gallery, JSON.stringify(a));},

  upsertCustomer({name, phone}){
    const phoneN=normPhone(phone);
    const list=Store.getCustomers();
    let c=list.find(x=>x.phoneN===phoneN && phoneN);
    if(!c){
      c={id:"cu_"+Math.random().toString(16).slice(2,10), name, phone, phoneN, createdAt:new Date().toISOString()};
      list.push(c);
    }else{
      c.name=name||c.name; c.phone=phone||c.phone; c.phoneN=phoneN||c.phoneN;
    }
    Store.setCustomers(list); return c;
  },

  addBooking(b){const all=Store.getBookings(); /* çakışma kontrol */
    if(all.some(x=>x.staffId===b.staffId && x.date===b.date && x.time===b.time && x.status==="active")){
      throw new Error("Bu saat dolu.");
    }
    all.push(b); Store.setBookings(all);
  },
  updateBooking(id, patch){
    const all=Store.getBookings(); const i=all.findIndex(x=>x.id===id);
    if(i>=0){all[i]={...all[i],...patch}; Store.setBookings(all);}
  },
  deleteBooking(id){Store.setBookings(Store.getBookings().filter(b=>b.id!==id));},

  addGalleryItem(item){ const g=Store.getGallery(); g.unshift(item); Store.setGallery(g); },
  deleteGalleryItem(id){ Store.setGallery(Store.getGallery().filter(x=>x.id!==id)); }
};

/* =========================
   4) SLOT HESAPLAMA (15dk)
========================= */
function subtractIntervals(base, cuts){
  let r=base.slice();
  for(const c of cuts){
    const next=[];
    for(const b of r){
      if(c.e<=b.s || c.s>=b.e) next.push(b);
      else{
        if(c.s>b.s) next.push({s:b.s,e:c.s});
        if(c.e<b.e) next.push({s:c.e,e:b.e});
      }
    }
    r=next;
  }
  return r.filter(x=>x.e-x.s>0).sort((a,b)=>a.s-b.s);
}
function getFreeIntervals(dateStr, staffId){
  const d=new Date(dateStr+"T00:00:00");
  const dow=d.getDay();
  const hours=Store.getHours()||SEED.workingHours;
  const wh=hours[dow];
  if(!wh) return [];
  const base=[{s:toMin(wh.start), e:toMin(wh.end)}];
  const breaks=(wh.breaks||[]).map(x=>({s:toMin(x.start), e:toMin(x.end)}));
  const busy=Store.getBookings()
    .filter(b=>b.staffId===staffId && b.date===dateStr && b.status==="active")
    .map(b=>({s:toMin(b.time), e:toMin(b.endTime)}));
  let free=subtractIntervals(base, breaks);
  free=subtractIntervals(free, busy);
  return free;
}
function generateSlots(dateStr, staffId, durationMin, step=15){
  if(!dateStr||!staffId||!durationMin) return [];
  const free=getFreeIntervals(dateStr, staffId);
  const slots=[];
  for(const intv of free){
    let t=intv.s;
    if(t%step!==0) t += (step - (t%step));
    while(t+durationMin<=intv.e){ slots.push(fromMin(t)); t+=step; }
  }
  return slots;
}

    if(!q) return true;
    const hay=[b.customerName,b.customerPhone,b.staffName,(b.serviceNames||[]).join(" "),b.date,b.time,b.endTime].join(" ").toLowerCase();
    return hay.includes(q);
  });

  const today=ymd(new Date());
  const todayCount=all.filter(b=>b.date===today && b.status==="active").length;

  return `
    <div class="rowTitle">Randevular</div>
    <div class="form">

/* =========================
   8) APP ACTIONS
========================= */
const App={
  nav(route){
    const map={
      home:"home",
      services:"services",
      staff:"staff",
      contact:"contact",
      where:"where",
      gallery:"gallery",
      account:"account",
      book_services:"book_services",
      admin:"admin_login",
      admin_panel:"admin_panel"
    };
    if(route==="logout"){App.logout(); return;}
    push(map[route]||route);
  },

  startBooking(){ push("book_services"); },
  resetBooking(){ State.bookingDraft={serviceIds:[], date:null, staffId:null, time:null}; toast("Sıfırlandı"); render(); },
  toggleService(id){
    const s=new Set(State.bookingDraft.serviceIds);
    s.has(id)?s.delete(id):s.add(id);
    State.bookingDraft.serviceIds=[...s];
    render();
  },
  nextBooking(){
    if(!State.bookingDraft.serviceIds.length){ toast("En az 1 hizmet seç"); return; }
    push("book_pick");
  },
  setDate(ds){ State.bookingDraft.date=ds; State.bookingDraft.time=null; render(); },
  setStaff(id){ State.bookingDraft.staffId=id; State.bookingDraft.time=null; render(); },
  setTime(t){ State.bookingDraft.time=t; render(); },

  finishBooking(){
    const services=Store.getServices();
    const staff=Store.getStaff();
    const selectedServices=State.bookingDraft.serviceIds.map(id=>services.find(s=>s.id===id)).filter(Boolean);
    const totalDur=sum(selectedServices.map(s=>s.duration))||30;
    const totalPrice=sum(selectedServices.map(s=>s.price))||0;
    const date=State.bookingDraft.date;
    const staffId=State.bookingDraft.staffId;
    const time=State.bookingDraft.time;

    if(!date||!staffId||!time){ toast("Tarih / personel / saat seç"); return; }

    const slots=generateSlots(date, staffId, totalDur, 15);
    if(!slots.includes(time)){ toast("Bu saat dolu veya uygun değil"); return; }

    // login yoksa önce login
    const me=Store.getMe();
    if(!me){
      State.pendingFinalize=true;
      toast("Önce giriş yap", "Hesabım ekranına yönlendirildi");
      push("account");
      return;
    }

    const endTime=fromMin(toMin(time)+totalDur);
    const st=staff.find(x=>x.id===staffId);
    const booking={
      id:"bk_"+Math.random().toString(16).slice(2,10),
      status:"active",
      createdAt:new Date().toISOString(),
      customerId:me.id,
      customerName:me.name,
      customerPhone:me.phone,
      staffId, staffName:st?.name||"",
      date, time, endTime,
      serviceIds:[...State.bookingDraft.serviceIds],
      serviceNames:selectedServices.map(s=>s.name),
      totalDuration:totalDur,
      totalPrice
    };

    try{
      Store.addBooking(booking);
      toast("Randevu oluşturuldu ✅", `${date} ${time} - ${endTime}`);
      State.bookingDraft={serviceIds:[], date:null, staffId:null, time:null};
      State.acctTab="active";
      push("account");
    }catch(e){
      toast("Bu saat dolu ❌", "Başka saat seç");
    }
  },

  login(){
    const name=$("#inName")?.value?.trim();
    const phone=$("#inPhone")?.value?.trim();
    if(!name||!phone){ toast("Ad ve telefon gir"); return; }
    const c=Store.upsertCustomer({name, phone});
    Store.setMe({id:c.id, name:c.name, phone:c.phone});
    toast("Giriş yapıldı ✅");
    // Eğer randevu tamamlamak için geldiyse
    if(State.pendingFinalize){
      State.pendingFinalize=false;
      push("book_pick");
      return;
    }
    render();
  },
  logout(){
    Store.clearMe();
    State.isAdmin=false;
    toast("Çıkış yapıldı");
    goHome();
  },
  setAcctTab(t){ State.acctTab=t; render(); },
  cancelBooking(id){
    if(!confirmSafe("Randevuyu iptal etmek istiyor musun?")) return;
    Store.updateBooking(id, {status:"cancelled", cancelledAt:new Date().toISOString()});
    toast("Randevu iptal edildi");
    render();
  },

  openAdmin(){ push("admin_login"); },
  adminLogin(){
    const pin=$("#adminPin")?.value?.trim();
    if(pin!==CONFIG.adminPin){ toast("PIN yanlış ❌"); return; }
    State.isAdmin=true;
    State.adminTab="services";
    push("admin_panel");
    toast("Admin giriş ✅");
  },
  adminLogout(){ State.isAdmin=false; toast("Admin çıkış"); goHome(); },

  setAdminTab(t){ State.adminTab=t; render(); },
  setAdminSearch(v){ State.adminSearch=v; render(); },
  setAdminBookingFilter(v){ State.adminBookingFilter=v; render(); },

  /* Services */
  addService(){
    const name=$("#as_name").value.trim();
    const price=Number($("#as_price").value||0);
    const dur=Number($("#as_dur").value||0);
    if(!name||!price||!dur){ toast("Ad/Fiyat/Süre doldur"); return; }
    const list=Store.getServices();
    list.push({id:"svc_"+Math.random().toString(16).slice(2,10), name, price, duration:dur});
    Store.setServices(list);
    $("#as_name").value=""; $("#as_price").value=""; $("#as_dur").value="";
    toast("Hizmet eklendi ✅");
    render();
  },
  editService(id){ State.editServiceId=id; render(); },
  cancelServiceEdit(){ State.editServiceId=null; render(); },
  saveServiceEdit(){
    const list=Store.getServices();
    const s=list.find(x=>x.id===State.editServiceId);
    if(!s){State.editServiceId=null;render();return;}
    const name=$("#as_name").value.trim();
    const price=Number($("#as_price").value||0);
    const dur=Number($("#as_dur").value||0);
    if(!name||!price||!dur){ toast("Ad/Fiyat/Süre doldur"); return; }
    s.name=name; s.price=price; s.duration=dur;
    Store.setServices(list);
    State.editServiceId=null;
    toast("Kaydedildi ✅");
    render();
  },
  delService(id){
    if(!confirmSafe("Bu hizmet silinsin mi?")) return;
    Store.setServices(Store.getServices().filter(s=>s.id!==id));
    toast("Silindi");
    render();
  },

  /* Staff */
  addStaff(){
    const name=$("#ap_name").value.trim();
    const role=$("#ap_role").value.trim();
    if(!name){ toast("Personel adı gir"); return; }
    const list=Store.getStaff();
    list.push({id:"st_"+Math.random().toString(16).slice(2,10), name, role: role||"Berber"});
    Store.setStaff(list);
    $("#ap_name").value=""; $("#ap_role").value="";
    toast("Personel eklendi ✅");
    render();
  },
  editStaff(id){ State.editStaffId=id; render(); },
  cancelStaffEdit(){ State.editStaffId=null; render(); },
  saveStaffEdit(){
    const list=Store.getStaff();
    const p=list.find(x=>x.id===State.editStaffId);
    if(!p){State.editStaffId=null;render();return;}
    const name=$("#ap_name").value.trim();
    const role=$("#ap_role").value.trim();
    if(!name){ toast("Personel adı gir"); return; }
    p.name=name; p.role=role||"Berber";
    Store.setStaff(list);
    State.editStaffId=null;
    toast("Kaydedildi ✅");
    render();
  },
  delStaff(id){
    const active=Store.getBookings().some(b=>b.staffId===id && b.status==="active");
    if(active){ toast("Bu personelin aktif randevusu var!", "Önce iptal/tamamla"); return; }
    if(!confirmSafe("Personel silinsin mi?")) return;
    Store.setStaff(Store.getStaff().filter(p=>p.id!==id));
    toast("Silindi");
    render();
  },

  /* Bookings admin */
  adminCancel(id){
    if(!confirmSafe("Randevu iptal edilsin mi?")) return;
    Store.updateBooking(id,{status:"cancelled", cancelledAt:new Date().toISOString()});
    toast("İptal edildi");
    render();
  },
  adminMarkCompleted(id){
    Store.updateBooking(id,{status:"completed", completedAt:new Date().toISOString()});
    toast("Tamamlandı ✅");
    render();
  },
  adminDeleteBooking(id){
    if(!confirmSafe("Randevu tamamen silinsin mi?")) return;
    Store.deleteBooking(id);
    toast("Silindi");
    render();
  },

  /* CSV */
  exportBookingsCSV(){
    const rows=[["ID","Durum","Tarih","Başlangıç","Bitiş","Personel","Müşteri","Telefon","Hizmetler","Süre(dk)","Tutar(₺)","Oluşturma"]];
    Store.getBookings().forEach(b=>{
      rows.push([b.id,b.status,b.date,b.time,b.endTime,b.staffName,b.customerName,b.customerPhone,(b.serviceNames||[]).join(" + "),b.totalDuration,b.totalPrice,b.createdAt]);
    });
    downloadCSV("randevular.csv", rows);
    toast("CSV indirildi");
  },
  exportCustomersCSV(){
    const rows=[["ID","Ad","Telefon","Oluşturma","Randevu Sayısı"]];
    const bookings=Store.getBookings();
    Store.getCustomers().forEach(c=>{
      rows.push([c.id,c.name,c.phone,c.createdAt, bookings.filter(b=>b.customerId===c.id).length]);
    });
    downloadCSV("musteriler.csv", rows);
    toast("CSV indirildi");
  },

  /* Gallery admin */
  addGalleryUrl(){
    const url=$("#g_url").value.trim();
    const cap=$("#g_cap").value.trim();
    if(!url){ toast("URL gir"); return; }
    Store.addGalleryItem({id:"g_"+Math.random().toString(16).slice(2,10), src:url, caption:cap, createdAt:new Date().toISOString()});
    $("#g_url").value=""; $("#g_cap").value="";
    toast("Galeriye eklendi ✅");
    render();
  },
  async addGalleryFile(){
    const input=$("#g_file");
    const cap=$("#g_file_cap").value.trim();
    const file=input.files?.[0];
    if(!file){ toast("Fotoğraf seç"); return; }

    // Basit küçültme (max 900px) -> dataURL
    const dataUrl = await new Promise((resolve,reject)=>{
      const img=new Image();
      const fr=new FileReader();
      fr.onload=()=>{ img.src=fr.result; };
      fr.onerror=reject;
      img.onload=()=>{
        const max=900;
        const w=img.width, h=img.height;
        const ratio=Math.min(1, max/Math.max(w,h));
        const cw=Math.round(w*ratio), ch=Math.round(h*ratio);
        const canvas=document.createElement("canvas");
        canvas.width=cw; canvas.height=ch;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,cw,ch);
        resolve(canvas.toDataURL("image/jpeg",0.82));
      };
      img.onerror=reject;
      fr.readAsDataURL(file);
    });

    try{
      Store.addGalleryItem({id:"g_"+Math.random().toString(16).slice(2,10), src:dataUrl, caption:cap, createdAt:new Date().toISOString()});
      $("#g_file").value=""; $("#g_file_cap").value="";
      toast("Yüklendi ✅");
      render();
    }catch(e){
      toast("Depolama dolu olabilir", "URL ile eklemeyi dene");
    }
  },
  delGallery(id){
    if(!confirmSafe("Fotoğraf silinsin mi?")) return;
    Store.deleteGalleryItem(id);
    toast("Silindi");
    render();
  },

  resetAll(){
    if(!confirmSafe("TÜM VERİLER SIFIRLANSIN MI?")) return;
    Store.resetAll();
    State.isAdmin=false;
    toast("Sıfırlandı");
    goHome();
  }
};

/* =========================
   9) RENDER
========================= */
function render(){
  // topbar görünümü
  const topbar=$("#topbar");
  const content=$("#content");
  if(State.route==="home"){
    topbar.classList.add("hidden"); content.classList.add("full");
  }else{
    topbar.classList.remove("hidden"); content.classList.remove("full");
  }

  let html="";
  switch(State.route){
    case "home": html=Home(); break;
    case "services": html=Services(); break;
    case "staff": html=Staff(); break;
    case "contact": html=Contact(); break;
    case "where": html=Where(); break;
    case "gallery": html=Gallery(); break;
    case "account": html=Account(); break;
    case "book_services": html=BookServices(); break;
    case "book_pick": html=BookPick(); break;
    case "admin_login": html=AdminLogin(); break;
    case "admin_panel": html=AdminPanel(); break;
    default: html=Home(); break;
  }
  content.innerHTML=html;

  // topbar title
  if(State.route==="home"){ setTopbar(""); }
  else{
    const titles={
      services:"HİZMETLERİMİZ", staff:"PERSONELİMİZ", contact:"İLETİŞİM", where:"NEREDEYİZ",
      gallery:"GALERİ", account:"HESABIM", book_services:"RANDEVU AL", book_pick:"RANDEVU AL",
      admin_login:"ADMİN", admin_panel:"ADMİN PANEL"
    };
    setTopbar(titles[State.route]||"");
  }

  // scroll to top
  content.scrollTop=0;
}

/* =========================
   10) INIT
========================= */
Store.init();
$("#backBtn").addEventListener("click", ()=>back());
$("#homeBtn").addEventListener("click", ()=>goHome());
render();
</script>
</body>
