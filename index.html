<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli | Smart Scheduler v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --gold: #d4a373; --gold-dark: #a67c52; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8fafc; }
        .client-bg {
            background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .client-bg::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
        .glass-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px; padding: 40px; width: 92%; max-width: 480px; z-index: 10; position: relative;
        }
        .input-box { background: white; border-radius: 12px; padding: 12px 16px; width: 100%; height: 50px; border: none; font-size: 14px; font-weight: 500; color: var(--primary); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: white; font-weight: 700; width: 100%; padding: 16px; border-radius: 16px; text-transform: uppercase; }
        
        .admin-nav-btn {
            background: white; border: 1px solid #e2e8f0; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1/1; gap: 8px; font-weight: 700; font-size: 10px; color: #64748b; transition: 0.3s;
        }
        .admin-nav-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }

        .slot { background: white; border-radius: 10px; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: var(--primary); cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .slot-selected { background: var(--primary) !important; color: white !important; }
        .slot-busy { opacity: 0.2; text-decoration: line-through; pointer-events: none; background: #cbd5e1; }
        
        .admin-card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #e2e8f0; height: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="clientUI" class="client-bg">
        <button onclick="openM('searchM')" class="fixed top-6 left-6 bg-white/90 px-4 py-2 rounded-xl text-[10px] font-black text-blue-900 z-50">SORGULA</button>
        <button onclick="openM('authM')" class="fixed top-6 right-6 bg-white/90 px-4 py-2 rounded-xl text-[10px] font-black text-blue-900 z-50">ADMİN</button>

        <div class="glass-card text-center">
            <div class="mb-8">
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">AHMET TEKELİ</h1>
                <p class="text-white/50 text-[10px] tracking-[6px] uppercase font-light">Barber Experience</p>
            </div>

            <div class="space-y-4 text-left">
                <input type="text" id="cName" placeholder="Adınız Soyadınız" class="input-box">
                <input type="tel" id="cPhone" placeholder="05XX XXX XX XX" class="input-box">
                <div class="grid grid-cols-2 gap-3">
                    <select id="sBarber" onchange="loadSlots()" class="input-box appearance-none"></select>
                    <select id="sService" onchange="loadSlots()" class="input-box appearance-none"></select>
                </div>
                <input type="date" id="sDate" onchange="loadSlots()" class="input-box">
                <div id="slotGrid" class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto bg-white/5 p-2 rounded-xl"></div>
            </div>
            <button onclick="book()" class="btn-gold mt-8 shadow-2xl">RANDEVU OLUŞTUR</button>
        </div>
    </div>

    <div id="adminUI" class="fixed inset-0 bg-[#f8fafc] hidden z-[100] overflow-y-auto">
        <div class="bg-white border-b h-20 flex items-center px-8 justify-between sticky top-0 z-50 shadow-sm">
            <h2 class="font-black text-blue-900 uppercase tracking-tighter">AHMET TEKELİ | YÖNETİM</h2>
            <button onclick="location.reload()" class="text-red-500 font-bold text-xs">PANELİ KAPAT</button>
        </div>

        <div class="max-w-6xl mx-auto p-6">
            <div class="grid grid-cols-3 md:grid-cols-6 gap-3 mb-8">
                <button onclick="tab('t-apps')" class="admin-nav-btn active" id="btn-t-apps"><span>📅</span><span>Randevu</span></button>
                <button onclick="tab('t-users')" class="admin-nav-btn" id="btn-t-users"><span>👥</span><span>Müşteri</span></button>
                <button onclick="tab('t-barbers')" class="admin-nav-btn" id="btn-t-barbers"><span>✂️</span><span>Berberler</span></button>
                <button onclick="tab('t-services')" class="admin-nav-btn" id="btn-t-services"><span>💰</span><span>Hizmetler</span></button>
                <button onclick="tab('t-hours')" class="admin-nav-btn" id="btn-t-hours"><span>⏰</span><span>Mesai</span></button>
                <button onclick="tab('t-gallery')" class="admin-nav-btn" id="btn-t-gallery"><span>🖼️</span><span>Galeri</span></button>
            </div>

            <div id="t-services" class="t-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="admin-card">
                        <h4 class="font-bold mb-4">Yeni Hizmet & Süre</h4>
                        <input type="text" id="newSN" class="input-box border mb-2" placeholder="Hizmet Adı (Örn: Saç Sakal)">
                        <input type="number" id="newSP" class="input-box border mb-2" placeholder="Fiyat (TL)">
                        <select id="newSDur" class="input-box border mb-4">
                            <option value="30">30 Dakika</option>
                            <option value="60">60 Dakika (1 Saat)</option>
                            <option value="90">90 Dakika (1.5 Saat)</option>
                            <option value="120">120 Dakika (2 Saat)</option>
                        </select>
                        <button onclick="addS()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">LİSTEYE EKLE</button>
                    </div>
                    <div id="list-services" class="space-y-2"></div>
                </div>
            </div>

            <div id="t-apps" class="t-content block"><div id="list-apps" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></div>
            <div id="t-barbers" class="t-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="admin-card">
                        <input type="text" id="newB" class="input-box border mb-2" placeholder="Berber Adı">
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <input type="time" id="newBS" class="input-box border" value="09:00">
                            <input type="time" id="newBE" class="input-box border" value="20:00">
                        </div>
                        <button onclick="addB()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold">BERBER EKLE</button>
                    </div>
                    <div id="list-barbers" class="space-y-2"></div>
                </div>
            </div>
            <div id="t-gallery" class="t-content hidden">
                <input type="file" multiple onchange="processImg(this, 'g')" class="mb-4">
                <div id="galGrid" class="grid grid-cols-4 gap-4"></div>
            </div>
            <div id="t-users" class="t-content hidden"><div id="list-users" class="grid grid-cols-4 gap-4"></div></div>
            <div id="t-hours" class="t-content hidden"><div id="hourSummary" class="space-y-2"></div></div>
        </div>
    </div>

    <div id="searchM" class="fixed inset-0 bg-black/90 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-8 w-full max-w-sm text-center">
            <h3 class="font-bold mb-4">Randevu Sorgula</h3>
            <input type="tel" id="qPhone" placeholder="Telefon Numaranız" class="input-box border mb-4">
            <button onclick="find()" class="btn-gold !bg-blue-900">SORGULA</button>
            <div id="qRes" class="mt-4 text-left text-sm"></div>
            <button onclick="closeM('searchM')" class="mt-4 text-slate-400 text-xs">KAPAT</button>
        </div>
    </div>

    <div id="authM" class="fixed inset-0 bg-black/90 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-8 w-full max-w-sm text-center">
            <h3 class="font-bold mb-4">Giriş</h3>
            <input type="password" id="adminPass" class="input-box border mb-4 text-center">
            <button onclick="auth()" class="btn-gold !bg-slate-800">GİRİŞ</button>
            <button onclick="closeM('authM')" class="mt-4 text-slate-400 text-xs">İPTAL</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('at_smart_v14')) || {
            barbers: [{name: 'Ahmet Tekeli', s: '09:00', e: '21:00'}],
            services: [{n: 'Saç Kesimi', p: 400, d: 30}, {n: 'Saç Sakal', p: 600, d: 60}],
            apps: [],
            gallery: []
        };

        const save = () => { localStorage.setItem('at_smart_v14', JSON.stringify(db)); render(); };
        const openM = (id) => document.getElementById(id).style.display = 'flex';
        const closeM = (id) => document.getElementById(id).style.display = 'none';

        function tab(id) {
            document.querySelectorAll('.t-content').forEach(c => c.classList.replace('block', 'hidden'));
            document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.replace('hidden', 'block');
            document.getElementById('btn-'+id).classList.add('active');
        }

        // AKILLI TAKVİM MOTORU
        function loadSlots() {
            const grid = document.getElementById('slotGrid');
            const d = document.getElementById('sDate').value, bName = document.getElementById('sBarber').value, sName = document.getElementById('sService').value;
            grid.innerHTML = ""; if(!d || !bName || !sName) return;

            const bObj = db.barbers.find(x => x.name === bName);
            const sObj = db.services.find(x => x.n === sName);
            const serviceDuration = parseInt(sObj.d); // Dakika cinsinden süre

            let curr = new Date(`${d}T${bObj.s}`), end = new Date(`${d}T${bObj.e}`);
            
            while(curr < end) {
                let t = curr.toTimeString().substring(0,5);
                
                // Seçilen hizmetin süresi kadar ileriye bakarak doluluk kontrolü yap
                let isBusy = false;
                for(let step = 0; step < serviceDuration; step += 30) {
                    let checkTime = new Date(curr.getTime() + step * 60000).toTimeString().substring(0,5);
                    
                    // Bu saatte veya bu saati kapsayan bir randevu var mı?
                    let conflict = db.apps.find(a => a.date === d && a.barber === bName && (
                        (checkTime >= a.time && checkTime < a.endTime) // Yeni randevunun bir parçası mevcut bir randevuya çarpıyor mu?
                    ));
                    if(conflict) { isBusy = true; break; }
                    
                    // Mesai saati dışına taşıyor mu?
                    let checkDate = new Date(curr.getTime() + step * 60000);
                    let checkEnd = new Date(`${d}T${bObj.e}`);
                    if(checkDate >= checkEnd) { isBusy = true; break; }
                }

                let div = document.createElement('div');
                div.className = `slot ${isBusy ? 'slot-busy' : 'bg-white shadow-sm'}`;
                div.innerText = t;
                if(!isBusy) div.onclick = () => { 
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('slot-selected')); 
                    div.classList.add('slot-selected'); 
                    window.selT = t; 
                    window.selDur = serviceDuration;
                };
                grid.appendChild(div);
                curr.setMinutes(curr.getMinutes() + 30);
            }
        }

        function book() {
            const n = document.getElementById('cName').value, p = document.getElementById('cPhone').value, b = document.getElementById('sBarber').value, d = document.getElementById('sDate').value, s = document.getElementById('sService').value;
            if(!n || !p || !window.selT) return alert("Eksik bilgi!");
            
            // Bitiş saatini hesapla (süreye göre)
            let start = new Date(`${d}T${window.selT}`);
            let end = new Date(start.getTime() + window.selDur * 60000);
            let endTime = end.toTimeString().substring(0,5);

            db.apps.push({id: Date.now(), name: n, phone: p, barber: b, service: s, date: d, time: window.selT, endTime: endTime});
            save(); alert("Randevu oluşturuldu!"); location.reload();
        }

        // DİĞER FONKSİYONLAR
        function addS() {
            const n = document.getElementById('newSN').value, p = document.getElementById('newSP').value, d = document.getElementById('newSDur').value;
            if(n && p) { db.services.push({n, p, d}); save(); }
        }
        function addB() {
            const n = document.getElementById('newB').value, s = document.getElementById('newBS').value, e = document.getElementById('newBE').value;
            if(n) { db.barbers.push({name: n, s, e}); save(); }
        }
        function auth() { if(document.getElementById('adminPass').value === "1234") { closeM('authM'); document.getElementById('adminUI').style.display='block'; } }
        function find() {
            const p = document.getElementById('qPhone').value;
            const res = db.apps.filter(x => x.phone === p);
            document.getElementById('qRes').innerHTML = res.map(a => `<div class='border-b py-2'>${a.date} ${a.time}<br><b>${a.service}</b></div>`).join('');
        }
        function processImg(i, t) {
            Array.from(i.files).forEach(f => {
                let r = new FileReader(); r.onloadend = () => { db.gallery.push(r.result); save(); }; r.readAsDataURL(f);
            });
        }

        function render() {
            document.getElementById('sBarber').innerHTML = db.barbers.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
            document.getElementById('sService').innerHTML = db.services.map(s => `<option value="${s.n}">${s.n} (${s.p} TL)</option>`).join('');
            document.getElementById('list-apps').innerHTML = db.apps.map(a => `<div class='bg-white p-4 rounded-xl shadow-sm'><b>${a.name}</b><br><small>${a.date} ${a.time}-${a.endTime}<br>${a.barber}</small><br><button onclick="db.apps=db.apps.filter(x=>x.id!==${a.id});save()" class='text-red-500 text-xs'>SİL</button></div>`).join('');
            document.getElementById('list-services').innerHTML = db.services.map((s,i) => `<div class='bg-white p-3 rounded-xl border flex justify-between'><span>${s.n} (${s.d} dk)</span><button onclick="db.services.splice(${i},1);save()" class='text-red-500'>SİL</button></div>`).join('');
            document.getElementById('list-barbers').innerHTML = db.barbers.map((b,i) => `<div class='bg-white p-3 rounded-xl border flex justify-between'><span>${b.name}</span><button onclick="db.barbers.splice(${i},1);save()" class='text-red-500'>SİL</button></div>`).join('');
            document.getElementById('galGrid').innerHTML = db.gallery.map((img,i) => `<div class='relative'><img src='${img}' class='rounded-lg'><button onclick="db.gallery.splice(${i},1);save()" class='absolute top-0 right-0 bg-red-500 text-white p-1'>X</button></div>`).join('');
        }
        render();
    </script>
</body>
</html>
