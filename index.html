<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Pro | Takvimli Randevu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .slot-busy { background: #334155 !important; color: #64748b; cursor: not-allowed; text-decoration: line-through; }
        .slot-free { background: #1e293b; border: 1px solid #334155; cursor: pointer; }
        .slot-free:hover { border-color: #eab308; color: #eab308; }
        .slot-selected { background: #eab308 !important; color: black !important; font-weight: bold; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="flex justify-between items-center max-w-4xl mx-auto mb-8 bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="w-12 h-12 rounded-full border-2 border-yellow-500" onerror="this.src='https://via.placeholder.com/100?text=LOGO'">
            <span class="font-bold text-xl tracking-wider text-yellow-500">BARBER PRO</span>
        </div>
        <button onclick="toggleAdmin()" id="adminBtn" class="bg-slate-700 px-4 py-2 rounded-lg text-xs hover:bg-yellow-600 transition">Admin Giriş</button>
    </div>

    <div id="customerSection" class="max-w-4xl mx-auto">
        <div class="glass p-6 rounded-3xl mb-6">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">✂️ Randevu Al</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="custName" placeholder="Adınız Soyadınız" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none">
                <input type="tel" id="custPhone" placeholder="Telefon Numaranız" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 outline-none">
                <select id="selBarber" class="bg-slate-900 p-4 rounded-xl border border-slate-700"></select>
                <input type="date" id="selDate" onchange="renderTimeSlots()" class="bg-slate-900 p-4 rounded-xl border border-slate-700 text-white">
            </div>

            <div class="mt-8">
                <h3 class="text-sm font-semibold text-slate-400 mb-3 uppercase tracking-widest">Uygun Saatler</h3>
                <div id="timeSlots" class="grid grid-cols-4 md:grid-cols-6 gap-2">
                    </div>
            </div>

            <button onclick="confirmBooking()" class="w-full mt-8 bg-yellow-500 text-black font-bold py-4 rounded-2xl text-lg hover:bg-yellow-400 transition shadow-lg shadow-yellow-500/20">RANDEVUYU TAMAMLA</button>
        </div>
    </div>

    <div id="adminSection" class="max-w-5xl mx-auto hidden animate-fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-yellow-500">Yönetim Paneli</h2>
            <button onclick="toggleAdmin()" class="bg-red-500 px-4 py-2 rounded-lg text-sm">Çıkış Yap</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass p-6 rounded-3xl">
                <h3 class="font-bold mb-4">Gelecek Randevular</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-500 border-b border-slate-700">
                            <tr><th class="p-2">Müşteri</th><th class="p-2">Berber</th><th class="p-2">Tarih/Saat</th><th class="p-2">İşlem</th></tr>
                        </thead>
                        <tbody id="adminAppTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="font-bold mb-4 text-yellow-500">Berber Ekle</h3>
                    <div class="flex gap-2">
                        <input type="text" id="newBarber" placeholder="Berber Adı" class="flex-1 bg-slate-900 p-2 rounded-lg text-sm border border-slate-700">
                        <button onclick="addBarber()" class="bg-green-600 p-2 rounded-lg text-sm">Ekle</button>
                    </div>
                    <div id="barberTags" class="mt-4 flex flex-wrap gap-2"></div>
                </div>
                
                <div class="glass p-6 rounded-3xl">
                    <h3 class="font-bold mb-4">Çalışma Saatleri</h3>
                    <div class="flex items-center gap-2 text-sm">
                        <input type="time" id="workStart" value="09:00" class="bg-slate-900 p-2 rounded border border-slate-700"> - 
                        <input type="time" id="workEnd" value="20:00" class="bg-slate-900 p-2 rounded border border-slate-700">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // VERİ TABANI
        let db = JSON.parse(localStorage.getItem('barber_pro_v2')) || {
            barbers: ["Ahmet", "Mehmet"],
            appointments: [],
            workHours: { start: "09:00", end: "20:00" }
        };

        let selectedSlot = null;

        function save() {
            localStorage.setItem('barber_pro_v2', JSON.stringify(db));
            renderAll();
        }

        // DOLU/BOŞ SAATLERİ HESAPLA VE GÖSTER
        function renderTimeSlots() {
            const date = document.getElementById('selDate').value;
            const barber = document.getElementById('selBarber').value;
            const container = document.getElementById('timeSlots');
            container.innerHTML = "";

            if (!date) return;

            let current = new Date(`${date}T${db.workHours.start}`);
            let end = new Date(`${date}T${db.workHours.end}`);

            while (current < end) {
                const timeStr = current.toTimeString().substring(0, 5);
                const isBusy = db.appointments.some(a => a.date === date && a.time === timeStr && a.barber === barber);
                
                const btn = document.createElement('div');
                btn.innerText = timeStr;
                btn.className = `p-3 rounded-xl text-center transition ${isBusy ? 'slot-busy' : 'slot-free'}`;
                
                if (!isBusy) {
                    btn.onclick = () => {
                        document.querySelectorAll('.slot-free').forEach(b => b.classList.remove('slot-selected'));
                        btn.classList.add('slot-selected');
                        selectedSlot = timeStr;
                    };
                }
                container.appendChild(btn);
                current.setMinutes(current.getMinutes() + 30); // 30 dakikalık aralıklar
            }
        }

        // RANDEVU ONAYLA
        function confirmBooking() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const date = document.getElementById('selDate').value;
            const barber = document.getElementById('selBarber').value;

            if (!name || !phone || !date || !selectedSlot) return alert("Lütfen tüm alanları ve saati seçin!");

            db.appointments.push({ id: Date.now(), name, phone, date, time: selectedSlot, barber });
            save();
            alert(`Randevunuz ${selectedSlot} saatine ONAYLANDI!`);
            location.reload();
        }

        // ADMİN PANELİ GEÇİŞ
        function toggleAdmin() {
            const pass = document.getElementById('adminSection').classList.contains('hidden') ? prompt("Admin Şifresi (Varsayılan: 1234):") : "exit";
            if (pass === "1234" || pass === "exit") {
                document.getElementById('customerSection').classList.toggle('hidden');
                document.getElementById('adminSection').classList.toggle('hidden');
            } else {
                alert("Hatalı şifre!");
            }
        }

        // DİNAMİK LİSTELERİ ÇİZ
        function renderAll() {
            document.getElementById('selBarber').innerHTML = db.barbers.map(b => `<option value="${b}">${b}</option>`).join('');
            document.getElementById('barberTags').innerHTML = db.barbers.map(b => `<span class="bg-yellow-500/20 text-yellow-500 px-3 py-1 rounded-full text-xs">${b}</span>`).join('');
            
            document.getElementById('adminAppTable').innerHTML = db.appointments.sort((a,b) => a.date.localeCompare(b.date)).map(a => `
                <tr class="border-b border-slate-800">
                    <td class="p-3 font-bold">${a.name}<br><span class="text-xs text-slate-500">${a.phone}</span></td>
                    <td class="p-3">${a.barber}</td>
                    <td class="p-3 text-yellow-500">${a.date} | ${a.time}</td>
                    <td class="p-3"><button onclick="deleteApp(${a.id})" class="text-red-500">Sil</button></td>
                </tr>
            `).join('');
        }

        function deleteApp(id) {
            db.appointments = db.appointments.filter(a => a.id !== id);
            save();
        }

        function addBarber() {
            const name = document.getElementById('newBarber').value;
            if (name) { db.barbers.push(name); document.getElementById('newBarber').value = ""; save(); }
        }

        renderAll();
    </script>
</body>
</html>
